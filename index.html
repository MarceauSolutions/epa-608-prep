<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1c1c">
<title>EPA 608 Prep — Marceau</title>
<style>
:root{
  --gold:#C9963C; --gold-dim:#9c7430; --charcoal:#333333; --bg:#1c1c1c;
  --card:#262626; --card2:#2f2f2f; --line:#3c3c3c; --text:#ececec; --muted:#9a9a9a;
  --wrong:#c0392b; --wrong-bg:#3a2220;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:17px;line-height:1.5}
.wrap{max-width:680px;margin:0 auto;padding:16px 16px 64px;min-height:100vh}
header{display:flex;align-items:center;gap:10px;padding:8px 0 14px;border-bottom:1px solid var(--line);margin-bottom:16px}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  display:flex;align-items:center;justify-content:center;font-weight:800;color:#1c1c1c}
h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
.sub{font-size:12px;color:var(--muted);margin-top:1px}
h2{font-size:15px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:22px 0 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.btn{display:block;width:100%;text-align:left;background:var(--card2);color:var(--text);
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:16px;margin-bottom:10px;cursor:pointer}
.btn:active{transform:scale(.99)}
.btn .t{font-weight:700}
.btn .d{font-size:13px;color:var(--muted);margin-top:2px}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#1c1c1c;border:none}
.btn.gold .d{color:#3a2c10}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row .btn{flex:1;min-width:140px}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;
  background:#3a3a1f;color:var(--gold);border:1px solid var(--gold-dim);letter-spacing:.5px}
.pill.star{background:var(--gold);color:#1c1c1c;border:none}
.bar{height:9px;background:#1a1a1a;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.statline{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin:4px 0}
.topicrow{display:flex;align-items:center;gap:10px;margin:8px 0}
.topicrow .nm{flex:1;font-size:13px}
.topicrow .bar{flex:0 0 90px}
.topicrow .pc{flex:0 0 38px;text-align:right;font-size:12px;color:var(--muted)}
/* question */
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;color:var(--muted)}
.qtext{font-size:18px;font-weight:600;margin:6px 0 16px;line-height:1.45}
.opt{display:block;width:100%;text-align:left;background:var(--card2);color:var(--text);
  border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;font-size:16px;cursor:pointer;
  transition:background .12s}
.opt:active{transform:scale(.995)}
.opt.correct{background:rgba(201,150,60,.18);border-color:var(--gold);color:#fff}
.opt.correct .mk{color:var(--gold)}
.opt.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:#fff}
.opt.wrong .mk{color:var(--wrong)}
.opt.dim{opacity:.55}
.mk{font-weight:800;margin-right:8px}
.why{background:var(--card2);border-left:3px solid var(--gold);border-radius:8px;padding:12px 14px;
  font-size:14.5px;margin:6px 0 14px;display:none}
.why.show{display:block}
.why .lbl{color:var(--gold);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.why .src{display:block;margin-top:8px;font-size:11px;color:var(--muted);word-break:break-all}
.footbar{display:flex;gap:10px;align-items:center;margin-top:8px}
.footbar .prog{flex:1;font-size:13px;color:var(--muted)}
.nextbtn{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#1c1c1c;border:none;
  border-radius:12px;padding:13px 22px;font-size:16px;font-weight:700;cursor:pointer}
.nextbtn:disabled{opacity:.4}
.link{color:var(--gold);background:none;border:none;font-size:14px;cursor:pointer;padding:8px 0;text-decoration:underline}
.big{font-size:46px;font-weight:800;text-align:center;margin:10px 0 4px}
.big.pass{color:var(--gold)} .big.fail{color:var(--wrong)}
.center{text-align:center}
.note{font-size:12.5px;color:var(--muted);text-align:center;margin-top:10px}
.topright{margin-left:auto;display:flex;gap:8px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">M</div>
    <div>
      <h1>EPA 608 Prep</h1>
      <div class="sub">Real-pool adaptive trainer · Type I / II / III</div>
    </div>
    <div class="topright"><button class="link" onclick="go('home')">Home</button></div>
  </header>
  <div id="view"></div>
</div>

<script>
const BANK = [{"id":"I-001","type":"I","topic":"safety","q":"At high temperatures (for example open flames and glowing metal surfaces) R-12 and R-22 can decompose to form","options":["hydrozine gas","helium gas","phosgene gas","All of the above will be formed"],"answer":"phosgene gas","why":"CFC/HCFC refrigerants thermally decompose into phosgene and other toxic byproducts.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-002","type":"I","topic":"regulations-recordkeeping","q":"If the EPA regulations should change after a technician becomes certified","options":["the technician certification is grandfathered for six months to allow time for taking the recertification exam","a new certification test must be taken within 90 days to be recertified","then they may as well just throw their hands up in the air and go to the coffee shop and hang out eating jelly donuts","it is the technicians responsibility to comply with any future changes in the law"],"answer":"it is the technicians responsibility to comply with any future changes in the law","why":"Technicians are responsible for compliance with current and future regulations.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-003","type":"I","topic":"refrigerant-id-substitution","q":"Which of the following refrigerants is most commonly used as a replacement for R-12 in new household refrigerators?","options":["R-123","R-24","R-141a / 141b blend","R-134a"],"answer":"R-134a","why":"R-134a is the standard non-CFC replacement for R-12 in new household refrigeration.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-004","type":"I","topic":"recovery-equipment-requirements","q":"Recovery equipment used for the service or repair of small appliances must be certified by an EPA-approved laboratory if the recovery equipment was manufactured after","options":["May 15 1993","June 15 1992","July 15 1993","November 15 1993"],"answer":"November 15 1993","why":"Post-Nov 15 1993 recovery equipment must be lab-certified to EPA standards.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-005","type":"I","topic":"definitions-scope","q":"What is the maximum allowable factory charge of refrigerant for Type I appliances?","options":["4 pounds","5 pounds","7 pounds","10 pounds"],"answer":"5 pounds","why":"A small appliance is defined as factory-charged with 5 pounds or less.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-006","type":"I","topic":"recovery-levels","q":"Why is it important to obtain an accurate pressure reading of refrigerant inside a recovery cylinder?","options":["The pressure reading along with a temperature reading can indicate if there is excessive air or other non-condensibles in the cylinder","The pressure reading can indicate the remaining cylinder capacity","The pressure reading can indicate if the refrigerant has been damaged","Both A and C"],"answer":"The pressure reading along with a temperature reading can indicate if there is excessive air or other non-condensibles in the cylinder","why":"Pressure compared to P-T chart at a given temperature reveals non-condensables.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-007","type":"I","topic":"recovery-levels","q":"Recovery devices that were manufactured after November 15 1993 and are used for the recovery of refrigerant from small appliances must be capable of","options":["recovering 90% of the refrigerant when the compressor is operating or achieving a 4 inch vacuum under the conditions of ARI 740-1993","recovering 80% of the refrigerant when the compressor is operating","recovering 95% of the refrigerant when the compressor is operating or achieving a 4 inch vacuum under the conditions of ARI 740-1993","recovering 85% of the refrigerant when the compressor is operating"],"answer":"recovering 90% of the refrigerant when the compressor is operating or achieving a 4 inch vacuum under the conditions of ARI 740-1993","why":"Post-1993 small-appliance recovery: 90% with operating compressor or 4 in. vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-008","type":"I","topic":"access-valves-piercing","q":"Solderless piercing valves should not remain installed on refrigeration systems after completion of repairs because","options":["they are too expensive to remain on every product","they tend to leak over time","they become loose and vibrate","Both A and C"],"answer":"they tend to leak over time","why":"Piercing access valves are not a permanent seal and leak over time.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-009","type":"I","topic":"safety","q":"Whenever nitrogen is used to pressurize or blow debris out of a system,","options":["only nitrogen vapor should be used","only liquid nitrogen should be used","either liquid or vapor nitrogen can be used","nitrogen can only be used if mixed with R-22"],"answer":"only nitrogen vapor should be used","why":"Only dry nitrogen vapor is used; liquid nitrogen is dangerous and improper.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-010","type":"I","topic":"recovery-technique-compressor","q":"What can cause excessive pressure on the high side of an active self-contained recovery device?","options":["A closed recovery tank inlet valve","Excessive air or other non-condensables in the recovery tank","A closed recovery tank outlet valve","Either A or B"],"answer":"Either A or B","why":"A closed inlet valve or non-condensables both raise discharge pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-011","type":"I","topic":"disposal","q":"Portable refillable tanks or containers used to ship recovered refrigerants must meet what standard(s)?","options":["Department of Transportation (DOT)","Community Right-to-Know Act","Underwriters Laboratories (UL)","All of the above"],"answer":"Department of Transportation (DOT)","why":"Shipping containers for recovered refrigerant must meet DOT standards.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-012","type":"I","topic":"recovery-levels","q":"A recovery cylinder which is half full of recovered R-22 at normal room temperature (about 75F), in the absence of non-condensables will be pressurized to","options":["250 psig","200 psig","175 psig","130 psig"],"answer":"130 psig","why":"R-22 saturation pressure at 75F is about 130 psig per the P-T chart.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-013","type":"I","topic":"refrigerant-id-substitution","q":"Before beginning a refrigerant recovery procedure it is ALWAYS necessary to","options":["allow the system to stabilize","determine the type of refrigerant in the system","move the system to an outdoor location","disconnect the appliance from its power source"],"answer":"determine the type of refrigerant in the system","why":"You must identify the refrigerant first to avoid cross-contaminating recovery cylinders.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-014","type":"I","topic":"refrigerant-id-substitution","q":"Which of the following refrigerants must be recovered with equipment currently regulated by the equipment certification requirements of the EPA under section 608?","options":["Sulfur Dioxide","Methyl Chloride","Methyl Formate","R-12"],"answer":"R-12","why":"R-12 is an ozone-depleting refrigerant regulated under Section 608.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-015","type":"I","topic":"safety","q":"In the event of a large release of R-12 or R-22 in a contained area, which of the following is true?","options":["Safety goggle and lined butyl gloves are all that is needed","Self-contained breathing apparatus (SCBA) or leaving the area is required","Respiratory protection is not required as these gases are not toxic","Dust masks are sufficient protection against harmful vapors"],"answer":"Self-contained breathing apparatus (SCBA) or leaving the area is required","why":"Large releases displace oxygen; SCBA or evacuation is required.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-016","type":"I","topic":"recovery-equipment-requirements","q":"According to the EPA which recovery equipment maintenance procedure(s) should be performed on a regular basis?","options":["Check recovery device for refrigerant leaks","Check vacuum pumps for any leaks","Check amperage draw of recovery device","All of the above"],"answer":"Check recovery device for refrigerant leaks","why":"EPA recommends routinely checking recovery equipment for refrigerant leaks.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-017","type":"I","topic":"safety","q":"Small amounts of refrigerant are odorless, so if a pungent odor is detected during a system recovery or repair,","options":["it is the characteristic smell of the oil","the refrigerant should not be recovered","a compressor burnout has likely occurred","Dudes... Dudettes... None of these answers be talkin' truth"],"answer":"a compressor burnout has likely occurred","why":"A pungent acid odor signals a compressor burnout producing acids.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-018","type":"I","topic":"recovery-technique-compressor","q":"When recovering refrigerant into a non-pressurized container from a refrigerator with an inoperative compressor","options":["it is only necessary to recover as much refrigerant as will naturally flow out of the system","it is not necessary to recover any refrigerant since it is probably contaminated","it is necessary to drive any refrigerant from the oil by using pressurized dry nitrogen","it is necessary to heat and strike the compressor with a rubber mallet"],"answer":"it is necessary to heat and strike the compressor with a rubber mallet","why":"With a dead compressor, heating/striking helps drive refrigerant from the oil.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-019","type":"I","topic":"safety","q":"Large spills of refrigerants can cause suffocation because","options":["they have a strong odor and make breathing difficult","they are lighter than air and cause dizziness","they sting the nose and cause sneezing","they are heavier than air and displace the oxygen"],"answer":"they are heavier than air and displace the oxygen","why":"Refrigerant vapor is heavier than air and displaces breathable oxygen.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-020","type":"I","topic":"definitions-scope","q":"Which of the following is not a Type I appliance?","options":["An MVAC system that holds three pounds of R-12","A water cooler that holds 13 ounces of R-12","A food freezer that holds 22 ounces of R-22","A dehumidifier with 7 ounces of R-500"],"answer":"An MVAC system that holds three pounds of R-12","why":"Motor vehicle A/C is covered under Section 609, not Type I.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-021","type":"I","topic":"refrigerant-id-substitution","q":"When R-500 is recovered from an appliance it","options":["can be mixed with either R-22 or R-12 during the recovery process since R-500 is actually a mixture of those two refrigerants","can be mixed with R-12 but not R-22 during the recovery process","need not be recovered since R-500 is not one of the refrigerants covered by the Clean Air Act","must be recovered into its own recovery vessel or a recovery cylinder that already contains R500"],"answer":"must be recovered into its own recovery vessel or a recovery cylinder that already contains R500","why":"Refrigerants must never be mixed; R-500 needs its own dedicated cylinder.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-022","type":"I","topic":"safety","q":"When you connect a manifiold set to check system pressures, it is always a good idea to","options":["release refrigerant to smell for acid","use equipment such as hand valves or self-sealing hoses to minimize any release","recover refrigerant and recharge to specifications even when no repairs are needed","use recovery equipment to gain access to the system during testing"],"answer":"use equipment such as hand valves or self-sealing hoses to minimize any release","why":"Low-loss/self-sealing fittings minimize venting during connection.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-023","type":"I","topic":"access-valves-piercing","q":"The EPA requires that all appliances be equipped with a service aperture or other device to be used when adding or removing refrigerant from appliances. For small appliances this service port is typically","options":["a straight piece of tubing called a Process Tube where the system can be entered using a piercing access valve","located 15 inches below the compressor","installed at the factory and is 1/4 inch diameter with machine threads","not present because small appliances are exempt from this requirement"],"answer":"a straight piece of tubing called a Process Tube where the system can be entered using a piercing access valve","why":"Small appliances are accessed via the process tube using a piercing valve.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-024","type":"I","topic":"definitions-scope","q":"Anyone who recovers refrigerant during the maintenance, service or repair of small appliances must be certified as a Universal Technician or a","options":["Type I Technician","Type II Technician","Type III Technician","Core Technician"],"answer":"Type I Technician","why":"Small appliance work requires Type I (or Universal) certification.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-025","type":"I","topic":"passive-vs-active-recovery","q":"EPA regulations require the capture of at least 80 percent of the refrigerant from a small appliance with a non-operating compressor if the technician is using","options":["a system-dependent (passive) recovery unit","a self-contained (active) recovery unit","either type of recovery unit","Refrigerant recovery from inoperable systems is not required"],"answer":"either type of recovery unit","why":"The 80% requirement (dead compressor) applies regardless of recovery unit type.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-026","type":"I","topic":"passive-vs-active-recovery","q":"When using a passive system-dependent recovery method on an appliance with an operating compressor, you should run that appliances compressor","options":["on 240 volts while recovering the refrigerant from the capillary tube.","for several minutes, shutting it off, then recover the refrigerant from the high side.","and recover the refrigerant from the high side.","for several minutes, shutting it off, then recover the refrigerant from the low side."],"answer":"for several minutes, shutting it off, then recover the refrigerant from the low side.","why":"Running then recovering from the low side draws refrigerant out efficiently.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-027","type":"I","topic":"passive-vs-active-recovery","q":"A passive system-dependent recovery device for small appliances","options":["never needs the use of a pump, compressor, or heat to recover the refrigerant.","must use a pressure-relief device when recovering refrigerant.","captures refrigerant in a non-pressurized container.","can only be performed on a system with an operating compressor."],"answer":"captures refrigerant in a non-pressurized container.","why":"Passive recovery relies on the system's own pressure into a non-pressurized container.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-028","type":"I","topic":"sales-restrictions","q":"The sale of CFC and HCFC refrigerants is","options":["banned.","limited by law to equipment owners of commercial equipment.","allowed only if the quantity is less than pounds.","restricted to technicians who are EPA certified in refrigerant recovery."],"answer":"restricted to technicians who are EPA certified in refrigerant recovery.","why":"Sales of these refrigerants are restricted to EPA-certified technicians.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-029","type":"I","topic":"refrigerant-id-substitution","q":"Which of the refrigerants listed below should be recovered with current EPA-approved recovery devices?","options":["Ammonia","Hydrogen","Water","None of the above"],"answer":"None of the above","why":"Ammonia, hydrogen, and water are not Section 608-regulated refrigerants.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-030","type":"I","topic":"leak-repair","q":"When servicing a small appliance with a leak","options":["it is mandatory to repair the leak within 30 days.","it is mandatory to repair the leak if more than 35 percent of the charge escapes within a 12-month period.","it is not mandatory to repair the leak but doing so is most responsible.","Both A and B."],"answer":"it is not mandatory to repair the leak but doing so is most responsible.","why":"Small appliance leak-repair is not mandated by EPA, but repair is responsible practice.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-031","type":"I","topic":"passive-vs-active-recovery","q":"For which of the following refrigeration systems/appliances would it be permissible to use a passive recovery device for refrigerant recovery?","options":["A centrifugal air conditioner.","A reciprocating liquid chiller.","A large commercial walk-in freezer with a single compressor.","A domestic refrigerator."],"answer":"A domestic refrigerator.","why":"Passive recovery is permitted on small appliances such as a domestic refrigerator.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-032","type":"I","topic":"access-valves-piercing","q":"When using any equipment or servicing any system that has schrader valves, it is critical to","options":["inspect the schrader valve core for bends and breakage.","replace any damaged schrader valve core to prevent leakage.","cap the schrader ports to prevent accidental depression of the valve core.","All of the above."],"answer":"All of the above.","why":"Inspecting, replacing, and capping Schrader cores all prevent leaks.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-033","type":"I","topic":"safety","q":"If R-12 or R-22 are exposed to high temperatures from open flames, glowing hot metal surfaces etc, these refrigerants can decompose to form","options":["hydrochloric and hydrofluoric acids.","sulfuric and phosphoric acids.","boric and chromic acids.","None of the above."],"answer":"hydrochloric and hydrofluoric acids.","why":"Thermal decomposition of R-12/R-22 produces hydrochloric and hydrofluoric acids.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-034","type":"I","topic":"recovery-levels","q":"When using a graduated charging cylinder, any refrigerant that is vented from the charging cylinder","options":["does not need to be recovered.","must be recovered.","is considered a de minimis release.","None of the above."],"answer":"must be recovered.","why":"Intentional venting is prohibited; that refrigerant must be recovered.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-035","type":"I","topic":"passive-vs-active-recovery","q":"A standard vacuum pump designed specifically for evacuation and dehydration can","options":["be used alone as a self-contained (active) recovery device.","never be used as a recovery device in combination with a pressurized container.","be used alone as a substitute for any recovery device.","be used alone as a system-dependent (passive) recovery device."],"answer":"never be used as a recovery device in combination with a pressurized container.","why":"A vacuum pump alone is not a recovery device and cannot pump into a pressurized container.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-036","type":"I","topic":"regulations-recordkeeping","q":"The EPA section 608 certification must be renewed every","options":["2 years.","3 years.","10 years.","The EPA certification has no expiration date."],"answer":"The EPA certification has no expiration date.","why":"Section 608 certification does not expire.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-037","type":"I","topic":"disposal","q":"Prior to shipping any used refrigerant it is necessary to","options":["properly label the refrigerant container.","properly complete shipping paperwork.","check that the refrigerant container meets Department of Transportation standards.","All of the above."],"answer":"All of the above.","why":"Shipping requires labeling, paperwork, and DOT-compliant containers.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-038","type":"I","topic":"refrigerant-id-substitution","q":"A refrigerant that can be used as a direct service \"drop-in\" substitute for R-12 in a small appliance is","options":["R-410a","R-134a","R-141b","None of the above"],"answer":"None of the above","why":"No true drop-in exists; substitution requires proper retrofit, not a drop-in.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-039","type":"I","topic":"access-valves-piercing","q":"After installing and opening a piercing access valve, if the system is ________ do not begin the recovery procedure.","options":["0 psig","15 psig","30 psig","40 psig"],"answer":"0 psig","why":"0 psig means the system already leaked empty; no refrigerant to recover and indicates a leak.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-040","type":"I","topic":"definitions-scope","q":"The EPA definition of a small appliance includes which of the following?","options":["A device manufactured, charged, and hermetically sealed from the factory.","A device with a charge of 5 pounds or less.","Products with compressors under one quarter horsepower.","Both A and B."],"answer":"Both A and B.","why":"Small appliances are factory-sealed and charged with 5 lb or less.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-041","type":"I","topic":"recovery-technique-compressor","q":"When using ________________ , it is essential to take extra measures such as heating or striking the compressor, to help release trapped refrigerant from the compressor oil.","options":["an active self-contained recovery device","a passive system-dependent recovery devices on an operating system","a passive system-dependent recovery device on a small appliance with a non-operating compressor","a refrigerant system has a low side leak"],"answer":"a passive system-dependent recovery device on a small appliance with a non-operating compressor","why":"With a dead compressor and passive recovery, heat/strike drives refrigerant from oil.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-042","type":"I","topic":"recovery-equipment-requirements","q":"It is an EPA regulation that any person who opens an appliance for maintenance, service, or repair, must have at least one self-contained recovery machine available at their place of business. The only exception to this rule are persons working on","options":["small appliances.","low-pressure appliances.","high-pressure appliances.","R-410a systems."],"answer":"small appliances.","why":"Small appliance technicians may use passive devices and are exempt from the self-contained machine rule.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-043","type":"I","topic":"safety","q":"Which of the following are part of the EPA's recommended safe work practices?","options":["Wear safety glasses or goggles when working with any compressed gas.","Wear a respirator when working with any refrigerant.","Wear butyl-lined gloves when connecting/disconnecting hoses.","Both A and C."],"answer":"Both A and C.","why":"Safety glasses and butyl-lined gloves are recommended; a respirator is not required for routine work.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-044","type":"I","topic":"recovery-levels","q":"Recovery devices that were manufactured before November 15 1993 and are used for recovery of refrigerant from small appliances must be capable of","options":["recovering 80% of the refrigerant whether or not the compressor is operating or achieving a 4-inch vacuum under conditions of ARI 740-1993.","recovering 70% of the refrigerant if the compressor is operating or achieving a 4-inch vacuum under conditions of ARI 740-1993.","achieving a 10-inch vacuum under conditions of ARI 740-1993.","recovering all of the refrigerant if they are still to be used."],"answer":"recovering 80% of the refrigerant whether or not the compressor is operating or achieving a 4-inch vacuum under conditions of ARI 740-1993.","why":"Pre-1993 small-appliance recovery standard is 80% or a 4-inch vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-045","type":"I","topic":"access-valves-piercing","q":"Piercing-type valves should only be used on which of the following type tubing materials?","options":["Copper","Aluminum","Steel","Both A and B"],"answer":"Both A and B","why":"Piercing valves are used on soft copper and aluminum tubing, not hard steel.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-046","type":"I","topic":"passive-vs-active-recovery","q":"When using a passive system-dependent recovery process, you should access both the high side and low side of the system for the refrigerant recovery if","options":["there is a leak in the system.","the systems compressor operates normally.","the systems compressor only operates at half speed.","the systems compressor does not run."],"answer":"the systems compressor does not run.","why":"With a non-running compressor, accessing both sides is needed to reach required efficiency.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-047","type":"I","topic":"recovery-technique-compressor","q":"On a small appliance with an operating compressor that has a completely plugged capillary tube, what is the minimum number of access valves that are needed to evacuate the refrigerant?","options":["Only one access valve on the low side of the system.","Only one access valve on the high side of the system.","Two valves, one on the high and one on the low side of the system because the capillary tube is plugged.","All of the above."],"answer":"Two valves, one on the high and one on the low side of the system because the capillary tube is plugged.","why":"A plugged cap tube blocks flow between sides, so both sides need access valves.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-048","type":"I","topic":"definitions-scope","q":"Technicians with a Type I small appliance certification are certified to recover refrigerant during the maintenance, service, or repair of","options":["small unitary air-conditioning systems with 7 pounds or less of refrigerant.","packaged terminal air-conditioners (PTACs) with pounds or less of refrigerant.","low-pressure equipment.","motor-vehicle air-conditioning equipment."],"answer":"packaged terminal air-conditioners (PTACs) with pounds or less of refrigerant.","why":"PTACs qualify as small appliances under Type I certification.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-049","type":"I","topic":"recovery-levels","q":"A recovery cylinder which is half full of recovered R-500 at normal room temperature, about 75F, in the absence of non-condensables, will be pressurized to","options":["30 psig","75 psig","95 psig","120 psig"],"answer":"95 psig","why":"R-500 saturation pressure at 75F is about 95 psig per the P-T chart.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-050","type":"I","topic":"refrigerant-id-substitution","q":"A refrigerant that can be used as a direct service \"drop-in\" substitute for R-22 in a small appliance is","options":["R-410a","R-134a","R-141b","None of the above"],"answer":"None of the above","why":"No true drop-in for R-22 exists; substitution requires retrofit.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-051","type":"I","topic":"recovery-technique-compressor","q":"If you are recovering refrigerant from a frost-free refrigerator, you should","options":["cool the compressor to force liquid out of the high side.","heat the recovery cylinder to vaporize liquid refrigerant.","turn on the defrost heater to vaporize any trapped liquid.","pack ice around the evaporator to ensure maximum liquid is available."],"answer":"turn on the defrost heater to vaporize any trapped liquid.","why":"The defrost heater warms the evaporator, vaporizing trapped liquid for recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-052","type":"I","topic":"recovery-levels","q":"When checking for nondensable gases inside a recovery cylinder, why allow temperature stabilization before taking pressure readings?","options":["To prevent safety valves from purging excess refrigerant.","Because it is a quick method of determining refrigerant level inside the tank.","Because a temperature reading alone is enough to determine refrigerant quality.","Because comparisons to a pressure-temperature chart require stable pressure and temperature."],"answer":"Because comparisons to a pressure-temperature chart require stable pressure and temperature.","why":"P-T chart comparison for non-condensables needs stabilized temperature and pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-053","type":"I","topic":"safety","q":"Whenever nitrogen is used to pressurize or blow debris out of a system, the nitrogen","options":["must be recovered.","can be vented.","should never be used.","can only be used if mixed with R-22."],"answer":"can be vented.","why":"Nitrogen is not a regulated refrigerant and may be vented.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-054","type":"I","topic":"disposal","q":"If a reclamation processing plant receives a recovery tank with mixed refrigerants, they can","options":["refuse to process the refrigerant and return it.","agree to destroy the refrigerant, but typically a substantial fee is charged.","resell the refrigerant for reuse in its current state.","Both A and B"],"answer":"Both A and B","why":"Mixed refrigerant cannot be reclaimed; the plant may refuse it or destroy it for a fee.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-055","type":"I","topic":"recovery-equipment-requirements","q":"Low-loss fittings are used to","options":["connect the recovery device to an appliance and are manually or automatically closed to prevent refrigerant loss when connecting/disconnecting hoses.","connect the recovery device to an appliance so that only a small loss occurs.","connect the recovery device to an appliance and have to be discarded after use.","None of the above."],"answer":"connect the recovery device to an appliance and are manually or automatically closed to prevent refrigerant loss when connecting/disconnecting hoses.","why":"Low-loss fittings seal (manually/automatically) to prevent release during connect/disconnect.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-056","type":"I","topic":"recovery-levels","q":"Recovery or recycling equipment manufactured after November 1, 1993, for small appliances must recover","options":["95 percent of the refrigerant whether or not the compressor is functional.","80 percent if the compressor is inoperable.","90 percent if the compressor is operational.","Both B and C."],"answer":"Both B and C.","why":"Post-1993 standard: 90% with operating compressor, 80% with inoperable compressor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-057","type":"I","topic":"sales-restrictions","q":"The sale of refrigerants is","options":["banned.","limited by law to equipment owners.","allowed only if there is proof of need.","restricted to technicians who are EPA certified in refrigerant recovery."],"answer":"restricted to technicians who are EPA certified in refrigerant recovery.","why":"Refrigerant sales are restricted to EPA-certified technicians.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-058","type":"I","topic":"recovery-levels","q":"A recovery cylinder half full of recovered R-410a at 90F, absent noncondensables, will be pressurized to","options":["100 psig","200 psig","300 psig","400 psig"],"answer":"300 psig","why":"R-410a saturation pressure at 90F is about 300 psig per the P-T chart.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-059","type":"I","topic":"refrigerant-id-substitution","q":"Which refrigerants can be mixed?","options":["R-12 and R-134a","R-12 and R-500","R-22 and R-410a","Refrigerants can never be mixed."],"answer":"Refrigerants can never be mixed.","why":"Different refrigerants must never be mixed during recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-060","type":"I","topic":"disposal","q":"When transporting refrigerants, DOT Regulation 49 CFR requires _____ to be recorded on shipping papers for hazard class 2.2","options":["Volume of each cylinder.","Total cubic feet of each refrigerant.","Number of cylinders of each gas.","Total weight of all cylinders."],"answer":"Number of cylinders of each gas.","why":"DOT 49 CFR class 2.2 shipping papers require the number of cylinders of each gas.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-061","type":"I","topic":"safety","q":"If a large refrigerant leak occurs in an enclosed area with no self-contained breathing apparatus, the technician should","options":["put on a dust mask and butyl-lined gloves and try to stop the leak.","put on a dust mask and use a leak detector to locate and stop it.","vacate and ventilate the area.","All of the above"],"answer":"vacate and ventilate the area.","why":"Without SCBA, the safe response to a large release is to leave and ventilate.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-062","type":"I","topic":"recovery-technique-compressor","q":"When recovering refrigerant from a household refrigerator where the compressor does not run, installing low side and high side access valves is recommended because","options":["it can enhance the speed of recovery.","it may be necessary to achieve required recovery efficiency.","otherwise the compressor may be damaged.","Both A and B"],"answer":"Both A and B","why":"Dual access speeds recovery and helps reach the required efficiency with a dead compressor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-063","type":"I","topic":"recovery-levels","q":"A recovery cylinder half full of R-12 at 75F, absent non-condensibles, will be pressurized to","options":["30 psig","75 psig","150 psig","200 psig"],"answer":"75 psig","why":"R-12 saturation pressure at 75F is about 75 psig per the P-T chart.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-064","type":"I","topic":"safety","q":"When using nitrogen, the nitrogen tank should always be equipped with a","options":["regulator.","level sensor.","yellow top.","hand valve."],"answer":"regulator.","why":"High-pressure nitrogen requires a regulator to control pressure safely.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-065","type":"I","topic":"recovery-technique-compressor","q":"To avoid accidental removal of liquid refrigerant when recovering vapor using a self-contained device that cannot handle liquid, draw vapor from the","options":["capillary tube.","low side.","high side.","All of the above."],"answer":"high side.","why":"Drawing from the high side avoids pulling liquid into a vapor-only recovery device.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-066","type":"I","topic":"access-valves-piercing","q":"If you install an access fitting on a sealed system","options":["the fitting should be leak tested before proceeding with recovery.","it is not necessary to leak test the access fitting.","the fitting does not need testing until the total repair is completed.","the system must be pressurized with dry nitrogen before leak testing."],"answer":"the fitting should be leak tested before proceeding with recovery.","why":"A newly installed access fitting must be leak-tested before recovery begins.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"II-001","type":"II","topic":"leak-detection-methods","q":"Heat pumps that use R-410A should be leak checked with","options":["HFCs","HCFCs to lower the cost of discarding the refrigerant","Pressurized nitrogen","Compressed oxygen"],"answer":"Pressurized nitrogen","why":"Nitrogen is the safe pressurizing gas for leak checks; never use the refrigerant, oxygen, or air.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-002","type":"II","topic":"leak-detection-methods","q":"Heat pumps retrofitted from R-22 to R-407C should be leak checked with","options":["HFCs","HCFCs","Pressurized nitrogen","Compressed air"],"answer":"Pressurized nitrogen","why":"Dry nitrogen is the proper pressurizing medium for leak checking, not air or refrigerants.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-003","type":"II","topic":"recovery-requirements-vacuum","q":"To change the compressor on a system containing R-410A, you must isolate the compressor and then","options":["Simply remove the compressor","Evacuate the isolated section of the system to atmospheric pressure and hold","Evacuate to 10 inches of vacuum and hold","Evacuate to 15 inches of vacuum and hold"],"answer":"Evacuate the isolated section of the system to atmospheric pressure and hold","why":"High-pressure (R-410A) systems are evacuated only to atmospheric pressure before major repair.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-004","type":"II","topic":"charging","q":"The method to charge a system with 80 pounds normal charge is to charge with","options":["Vapor through the suction line service valve","Liquid through the discharge service valve","Liquid through the suction service valve","Liquid through the liquid line service valve"],"answer":"Liquid through the liquid line service valve","why":"Large charges are added as liquid through the liquid line to charge quickly and accurately.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-005","type":"II","topic":"leak-detection-methods","q":"After installation of a field-piped R-410A split heat pump, the unit should first be","options":["Evacuated","Pressurized with R-22, then leak checked","Pressurized with R-410A, then leak checked","Pressurized with nitrogen, then leak checked"],"answer":"Pressurized with nitrogen, then leak checked","why":"After field piping, pressurize with dry nitrogen and leak check before evacuation/charging.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-006","type":"II","topic":"safety-cylinders","q":"Pressure relief valves must not be","options":["Installed in series","Installed in parallel","Installed vertically","Installed horizontally"],"answer":"Installed in series","why":"Relief valves in series can block each other; they must never be installed in series.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-007","type":"II","topic":"charging","q":"When charging an R-12 system with water-cooled condenser, charge with vapor to at least ___ before switching to liquid charging","options":["0 psig","20 psig","35 psig","100 psig"],"answer":"35 psig","why":"Add vapor first to raise pressure above freezing point before liquid charging to avoid freeze-up.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-008","type":"II","topic":"recovery-equipment-certification","q":"Recovery/recycling machine has R-22; must recover R-410A. What must be done first?","options":["Machine must be EPA-certified for R-410A use","Recovery tank must be designed for R-410A pressure","Filter and lubricant must be changed and machine evacuated","All of the above"],"answer":"All of the above","why":"Switching refrigerants requires certified high-pressure equipment, rated tank, and cross-contamination removal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-009","type":"II","topic":"recovery-technique-sequence","q":"After reaching required recovery vacuum, you must","options":["Immediately disconnect equipment and open system","Immediately break vacuum with nitrogen","Immediately pressurize with nitrogen and leak check","Wait to see if the system pressure rises indicating that there is still refrigerant"],"answer":"Wait to see if the system pressure rises indicating that there is still refrigerant","why":"A pressure rise after recovery shows trapped refrigerant boiling off; wait and re-recover.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-010","type":"II","topic":"cycle-components-mechanics","q":"In a refrigeration system, the component directly following the evaporator is the","options":["Receiver","Metering device","Accumulator","Condenser"],"answer":"Accumulator","why":"The accumulator follows the evaporator to trap liquid and protect the compressor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-011","type":"II","topic":"safety-cylinders","q":"A reciprocating compressor should not be energized while","options":["The discharge service valve is closed","The suction service valve is open","The discharge service valve is open","There is a demand for cooling"],"answer":"The discharge service valve is closed","why":"Running against a closed discharge valve causes dangerous pressure buildup.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-012","type":"II","topic":"safety-cylinders","q":"R-410A requires high-pressure manifold gauge and hose set with","options":["2000 psig burst, 400 psig working pressure","2000 psig burst, 800 psig working pressure","4000 psig burst, 400 psig working pressure","4000 psig burst, 800 psig working pressure"],"answer":"4000 psig burst, 800 psig working pressure","why":"R-410A's high pressures require gauges rated 800 psig working / 4000 psig burst.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-013","type":"II","topic":"cycle-components-mechanics","q":"Refrigerant pressure inside R-410A unit at room temperature (72F), not operating, is approximately","options":["74 psig","110 psig","210 psig","310 psig"],"answer":"210 psig","why":"R-410A's saturation pressure at 72F is roughly 210 psig, much higher than R-22/R-12.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-014","type":"II","topic":"safety-cylinders","q":"Every air conditioning or refrigeration system should be protected by a","options":["Pressure relief device","Properly located stop valve","Low-pressure control","Refrigerant receiver"],"answer":"Pressure relief device","why":"A pressure relief device protects against dangerous overpressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-015","type":"II","topic":"recovery-requirements-vacuum","q":"To change compressor on system with 40 pounds R-500 using recycling machine manufactured AFTER November 15, 1993","options":["Simply remove the compressor","Evacuate to atmospheric pressure, then remove","Evacuate to 10 inches of vacuum and hold. If system pressure does not rise, remove","Evacuate to 15 inches of vacuum and hold"],"answer":"Evacuate to 10 inches of vacuum and hold. If system pressure does not rise, remove","why":"Post-1993 equipment, <200 lb high-pressure charge: evacuate to 10 in Hg vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-016","type":"II","topic":"diagnosis-by-symptom","q":"When inspecting a system for leaks, look for","options":["Frost on the pipes","Puddles of liquid refrigerant","Particles from the drier core","Traces of oil"],"answer":"Traces of oil","why":"Oil traces escape with refrigerant at a leak, marking the leak location.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-017","type":"II","topic":"leak-detection-methods","q":"When a new system has been assembled, the first thing to do is","options":["Evacuate the system","Pressurize with inert gas and leak check","Pressurize with refrigerant to be used","Introduce initial charge and start compressor"],"answer":"Pressurize with inert gas and leak check","why":"Leak check first with inert gas before evacuating and charging.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-018","type":"II","topic":"refrigerant-substitution-retrofit","q":"R-410A is different from other ASHRAE 400 series blends because","options":["R-410A behaves as a near azeotropic refrigerant and can be topped off","R-410A is an HCFC","R-410A uses mineral oil","All of the above"],"answer":"R-410A behaves as a near azeotropic refrigerant and can be topped off","why":"R-410A is near-azeotropic, so it has minimal glide and can be topped off.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-019","type":"II","topic":"recovery-requirements-vacuum","q":"Manifold gauge set hoses should have self-sealing connectors or hand valves to","options":["Minimize chance of explosion during use","Prevent venting during recycling","Prevent vapor lock during rapid liquid transfer","Minimize the release of refrigerant when the hoses are connected and disconnected"],"answer":"Minimize the release of refrigerant when the hoses are connected and disconnected","why":"Low-loss fittings minimize refrigerant release during connect/disconnect.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-020","type":"II","topic":"recovery-requirements-vacuum","q":"Using recovery/recycling equipment manufactured AFTER November 15, 1993, evacuate system with MORE than 200 pounds CFC-12 to ___ before major repair","options":["0 psig","4 inches of Hg vacuum","10 inches of Hg vacuum","15 inches of Hg vacuum"],"answer":"15 inches of Hg vacuum","why":"Post-1993 equipment, >200 lb low-pressure (CFC-12) charge: evacuate to 15 in Hg.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-021","type":"II","topic":"recovery-technique-sequence","q":"With air-cooled condenser on roof and evaporator on first floor, recovery should first occur","options":["From vapor line entering condenser","From discharge side of compressor","From liquid line entering evaporator","On suction side of compressor"],"answer":"From liquid line entering evaporator","why":"Recover liquid from the lowest point first to speed recovery of the bulk charge.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-022","type":"II","topic":"safety-cylinders","q":"Never use oxygen or compressed air to leak check because R-410A can","options":["Explode when mixed with air or oxygen","Fractionate when mixed with oxygen","Condense when exposed to oxygen","None of the above"],"answer":"Explode when mixed with air or oxygen","why":"Pressurized refrigerant-air/oxygen mixtures can be combustible/explosive.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-023","type":"II","topic":"evacuation-dehydration","q":"Dry nitrogen should be used to break first vacuum when dehydrating by double evacuation method. However, it","options":["Often contains moisture","Is expensive","Is toxic","Can be dangerous if not used with a pressure regulator"],"answer":"Can be dangerous if not used with a pressure regulator","why":"High-pressure nitrogen cylinders require a regulator to avoid overpressurizing the system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-024","type":"II","topic":"recovery-equipment-certification","q":"A recovery machine using hermetic compressor will overheat when drawing deep vacuum because","options":["It runs faster than other equipment","The motor needs the flow of refrigerant through the compressor to provide motor cooling","Oils used in hermetic compressors burn at lower temperatures","It has higher compression ratio limit"],"answer":"The motor needs the flow of refrigerant through the compressor to provide motor cooling","why":"Hermetic motors rely on refrigerant flow for cooling, which is lost under deep vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-025","type":"II","topic":"charging","q":"Proper charging method for blended (non-azeotropic) refrigerants (400 series) is to remove charge from cylinder as a","options":["Vapor","Liquid","Superheated vapor","Subcooled liquid"],"answer":"Liquid","why":"Zeotropic blends must be removed as liquid to preserve correct composition.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-026","type":"II","topic":"leak-detection-methods","q":"When a refrigerant trace gas becomes absolutely necessary to use, which of the available refrigerants should be used to identify a leak?","options":["CFC-12","HCFC-22","HFC-407c","HFC-410a"],"answer":"HCFC-22","why":"When a trace refrigerant is unavoidable, HCFC-22 is used as the trace gas.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-027","type":"II","topic":"recovery-technique-sequence","q":"After refrigerant liquid has been recovered from a system, any remaining vapor is","options":["purged to the atmosphere","isolated in the system","pumped into the system receiver","condensed by the recovery system"],"answer":"condensed by the recovery system","why":"Remaining vapor is condensed by the recovery machine, never vented.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-028","type":"II","topic":"diagnosis-by-symptom","q":"An oil sample should be taken when","options":["a new filter dryer has been installed","the compressor has burned out","the unit is not cooling properly","recycled refrigerant has been added to the unit"],"answer":"the compressor has burned out","why":"An oil sample after a burnout checks acid level to plan cleanup.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-029","type":"II","topic":"cycle-components-mechanics","q":"In a refrigeration system with a TXV or other type of throttling device, the component directly following the condenser would be the","options":["receiver","metering device","accumulator","evaporator"],"answer":"receiver","why":"The receiver follows the condenser to store liquid refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-030","type":"II","topic":"recovery-technique-sequence","q":"Recovered refrigerant may contain which of the following?","options":["Acids","Moisture","Oils","All of the above"],"answer":"All of the above","why":"Recovered refrigerant can contain acids, moisture, and oil \u2014 hence recycle/reclaim.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-031","type":"II","topic":"cycle-components-mechanics","q":"The backseating of a suction shut-off valve will close the","options":["suction line and compressor port","compressor and gauge port","gauge port","compressor port"],"answer":"gauge port","why":"Backseating a service valve closes the gauge port to the manifold.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-032","type":"II","topic":"leak-rates-repair-timelines","q":"Which repair would always be considered 'major' under the EPA's regulations?","options":["Replacement of an evaporator coil","Replacement of a filter dryer","Replacement of a schrader valve core","Replacement of a condenser fan motor"],"answer":"Replacement of an evaporator coil","why":"Replacing an evaporator coil is a defined major repair requiring evacuation.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-033","type":"II","topic":"recovery-equipment-certification","q":"R-410a requires certified recovery and recycling equipment rated for at least","options":["240 psig","300 psig","400 psig","500 psig"],"answer":"400 psig","why":"R-410A's high pressures require recovery equipment rated at least 400 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-034","type":"II","topic":"cycle-components-mechanics","q":"A compressor heater is used to","options":["prevent refrigerant vaporization","remove entrained water","prevent acid pitting","reduce the amount of refrigerant in the lubricating oil"],"answer":"reduce the amount of refrigerant in the lubricating oil","why":"The crankcase heater drives refrigerant out of the oil to prevent migration/dilution.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-035","type":"II","topic":"recovery-equipment-certification","q":"Your recovery/recycling machine has R-502 refrigerant in it. You now have to recover refrigerant from a unit with R-22. What must be done before the R-22 refrigerant can be recovered/recycled?","options":["Nothing as long as the recovery machine is not full","Change the expansion valve on the recovery machine","Change the filter and expansion valve on the recovery machine","Recover as much of the R-502 as possible from the recovery machine, change the filter, and evacuate"],"answer":"Recover as much of the R-502 as possible from the recovery machine, change the filter, and evacuate","why":"Prevent cross-contamination by clearing prior refrigerant, changing filter, and evacuating.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-036","type":"II","topic":"recovery-technique-sequence","q":"The fastest way to recover refrigerant from a system is to remove it in the _______ phase.","options":["final","initial","liquid","vapor"],"answer":"liquid","why":"Liquid recovery moves the most refrigerant fastest.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-037","type":"II","topic":"recovery-technique-sequence","q":"Before using a recovery unit to remove a charge, what steps should be taken?","options":["Check service valve positions","Check the oil level in the recovery unit","Evacuate recovery unit and recovery tank","All of the above"],"answer":"All of the above","why":"Verify valves, oil level, and evacuate unit/tank before recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-038","type":"II","topic":"recovery-requirements-vacuum","q":"A deep vacuum is usually measured in","options":["psig","psia","inches of Hg","microns"],"answer":"microns","why":"Deep vacuum levels are measured in microns.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-039","type":"II","topic":"recovery-technique-sequence","q":"Before transferring refrigerant to an empty cylinder","options":["the refrigerant should be chilled","the refrigerant should be mixed","the cylinder should be heated","the cylinder should be evacuated to avoid mixing air with the recovered refrigerant"],"answer":"the cylinder should be evacuated to avoid mixing air with the recovered refrigerant","why":"Evacuate the cylinder first to keep noncondensables out of recovered refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-040","type":"II","topic":"recovery-technique-sequence","q":"To recover liquid refrigerant, you must connect one hose to the","options":["compressor suction valve","compressor discharge valve","liquid line","top of the condenser"],"answer":"liquid line","why":"Liquid recovery connects to the liquid line where refrigerant is liquid.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-041","type":"II","topic":"recovery-requirements-vacuum","q":"A system can be evacuated to only atmospheric pressure when","options":["the repair is major","the repair is followed by an evacuation of the appliance to the environment","leaks in the appliance make evacuation to the prescribed level unattainable","the appliance is being disposed"],"answer":"leaks in the appliance make evacuation to the prescribed level unattainable","why":"If leaks prevent reaching required vacuum, evacuation to atmospheric is allowed.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-042","type":"II","topic":"evacuation-dehydration","q":"The vacuum pump used to evacuate a system should be capable of pulling a vacuum of","options":["10mm Hg","20mm Hg","500 microns","1000 microns"],"answer":"500 microns","why":"A proper vacuum pump should reach about 500 microns to dehydrate the system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-043","type":"II","topic":"safety-cylinders","q":"While R-410a is a high-pressure refrigerant, it can be stored in the back of your service van as long as","options":["the temperature inside the vehicle does not exceed 125F. This is the same guidance given for R-22 and other common refrigerants","the temperature inside the vehicle does not exceed 125F. But R-22 can be stored in vehicles with temperatures exceeding 125F","the temperature inside the vehicle does not exceed 155F. This is the same guidance given for R-22 and other common refrigerants","the temperature inside the vehicle does not exceed 155F. But R-22 can be stored in vehicles with temperatures exceeding 155F"],"answer":"the temperature inside the vehicle does not exceed 125F. This is the same guidance given for R-22 and other common refrigerants","why":"Refrigerant cylinders must not exceed 125F to avoid dangerous pressure rise.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-044","type":"II","topic":"recovery-equipment-certification","q":"When under a deep vacuum, the motor winding of a hermetic refrigeration compressor","options":["will be damaged if energized","must be kept warm to operate properly","will be protected by its insulation","will overheat only if the crankcase heater is energized"],"answer":"will be damaged if energized","why":"Energizing a hermetic motor under deep vacuum can arc and destroy the windings.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-045","type":"II","topic":"recovery-equipment-certification","q":"Which statement is NOT true regarding recycling and recovery equipment manufactured after November 15 1993?","options":["It must be tested by an EPA approved third party","It must meet vacuum standards more stringent than those met by equipment manufactured before 15 November 1993","It must be equipped with low-loss fittings","It must have an oil separator"],"answer":"It must have an oil separator","why":"An oil separator is not a required feature of post-1993 recovery equipment.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-046","type":"II","topic":"cycle-components-mechanics","q":"When a unit is opened for servicing, the _______ should always be replaced.","options":["thermostat","metering device","crankcase heater","filter-drier"],"answer":"filter-drier","why":"Always replace the filter-drier whenever the system is opened.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-047","type":"II","topic":"recovery-technique-sequence","q":"When servicing an operating unit that has a receiver/storage tank, the","options":["compressor should be isolated off","liquid should be recovered last","refrigerant should be recovered into the receiver","gauge pressure should be achieved by venting"],"answer":"refrigerant should be recovered into the receiver","why":"Pump the charge down into the system's own receiver for storage during service.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-048","type":"II","topic":"diagnosis-by-symptom","q":"Use _______ to remove ice from a sight glass.","options":["an alcohol spray","water","R-11 refrigerant","a screw driver or flat file"],"answer":"an alcohol spray","why":"Alcohol spray safely melts/removes ice from a sight glass.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-049","type":"II","topic":"cycle-components-mechanics","q":"The refrigerant pressure inside an R-12 unit which is at room temperature (72F) and not operating is","options":["approximately 74 psig","approximately 154 psig","approximately 214 psig","approximately 304 psig"],"answer":"approximately 74 psig","why":"R-12's saturation pressure at 72F is about 74 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-050","type":"II","topic":"refrigerant-substitution-retrofit","q":"You are going to service a newer residential split-system air-conditioner. You would expect to find the system charged with which refrigerant?","options":["R-11","R-12","R-410a","R-502"],"answer":"R-410a","why":"Newer residential split systems are charged with R-410A.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-051","type":"II","topic":"recovery-equipment-certification","q":"A routine maintenance task which must be performed on refrigerant recycling machines is to","options":["check compressor seals","change electrical fuses","replace moisture sight glass","change filter and compressor oil if any"],"answer":"change filter and compressor oil if any","why":"Routine recovery-machine maintenance is changing the filter and oil.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-052","type":"II","topic":"recovery-technique-sequence","q":"Refrigerant should be removed from the condenser outlet if the","options":["condenser is on the roof","compressor is inoperative","evaporator has a leak","condenser is below the receiver"],"answer":"condenser is below the receiver","why":"Remove liquid from the lowest liquid point to recover the bulk charge fastest.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-053","type":"II","topic":"evacuation-dehydration","q":"When evacuating a system, the use of a large vacuum pump could","options":["cause trapped oil to freeze","cause trapped refrigerant to freeze","cause trapped water to freeze","causes the valves to freeze"],"answer":"cause trapped water to freeze","why":"Rapid evacuation can freeze trapped moisture, slowing dehydration.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-054","type":"II","topic":"diagnosis-by-symptom","q":"On refrigeration units that use an open compressor, the _______ is most likely to leak if the unit is not used for several months","options":["suction service valve","rotating shaft seal","oil drain plug","discharge service valve"],"answer":"rotating shaft seal","why":"Open-drive shaft seals dry out and leak during long idle periods.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-055","type":"II","topic":"recovery-equipment-certification","q":"The primary water source most often used for cooling the condenser of a water-cooled recovery unit is","options":["de-ionized water","chilled water","condenser water","local municipal water supply"],"answer":"local municipal water supply","why":"Municipal tap water is the common cooling source for water-cooled recovery units.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-056","type":"II","topic":"recovery-requirements-vacuum","q":"When using recovery and recycling equipment manufactured BEFORE November 15 1993, technicians must evacuate a unit that has a normal charge of 10 pounds of CFC-500 to _______ before disposing of the system","options":["0 psig","4 inches of Hg vacuum","10 inches of Hg vacuum","15 inches of Hg vacuum"],"a
