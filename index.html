<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1c1c">
<title>EPA 608 Prep — Marceau</title>
<style>
:root{
  --gold:#C9963C; --gold-dim:#9c7430; --charcoal:#333333; --bg:#1c1c1c;
  --card:#262626; --card2:#2f2f2f; --line:#3c3c3c; --text:#ececec; --muted:#9a9a9a;
  --wrong:#c0392b; --wrong-bg:#3a2220;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:17px;line-height:1.5}
.wrap{max-width:680px;margin:0 auto;padding:16px 16px 64px;min-height:100vh}
header{display:flex;align-items:center;gap:10px;padding:8px 0 14px;border-bottom:1px solid var(--line);margin-bottom:16px}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  display:flex;align-items:center;justify-content:center;font-weight:800;color:#1c1c1c}
h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
.sub{font-size:12px;color:var(--muted);margin-top:1px}
h2{font-size:15px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:22px 0 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.btn{display:block;width:100%;text-align:left;background:var(--card2);color:var(--text);
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:16px;margin-bottom:10px;cursor:pointer}
.btn:active{transform:scale(.99)}
.btn .t{font-weight:700}
.btn .d{font-size:13px;color:var(--muted);margin-top:2px}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#1c1c1c;border:none}
.btn.gold .d{color:#3a2c10}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row .btn{flex:1;min-width:140px}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;
  background:#3a3a1f;color:var(--gold);border:1px solid var(--gold-dim);letter-spacing:.5px}
.pill.star{background:var(--gold);color:#1c1c1c;border:none}
.bar{height:9px;background:#1a1a1a;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.statline{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin:4px 0}
.topicrow{display:flex;align-items:center;gap:10px;margin:8px 0}
.topicrow .nm{flex:1;font-size:13px}
.topicrow .bar{flex:0 0 90px}
.topicrow .pc{flex:0 0 38px;text-align:right;font-size:12px;color:var(--muted)}
/* question */
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;color:var(--muted)}
.qtext{font-size:18px;font-weight:600;margin:6px 0 16px;line-height:1.45}
.opt{display:block;width:100%;text-align:left;background:var(--card2);color:var(--text);
  border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;font-size:16px;cursor:pointer;
  transition:background .12s}
.opt:active{transform:scale(.995)}
.opt.correct{background:rgba(201,150,60,.18);border-color:var(--gold);color:#fff}
.opt.correct .mk{color:var(--gold)}
.opt.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:#fff}
.opt.wrong .mk{color:var(--wrong)}
.opt.dim{opacity:.55}
.mk{font-weight:800;margin-right:8px}
.why{background:var(--card2);border-left:3px solid var(--gold);border-radius:8px;padding:12px 14px;
  font-size:14.5px;margin:6px 0 14px;display:none}
.why.show{display:block}
.why .lbl{color:var(--gold);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.why .src{display:block;margin-top:8px;font-size:11px;color:var(--muted);word-break:break-all}
.footbar{display:flex;gap:10px;align-items:center;margin-top:8px}
.footbar .prog{flex:1;font-size:13px;color:var(--muted)}
.nextbtn{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#1c1c1c;border:none;
  border-radius:12px;padding:13px 22px;font-size:16px;font-weight:700;cursor:pointer}
.nextbtn:disabled{opacity:.4}
.link{color:var(--gold);background:none;border:none;font-size:14px;cursor:pointer;padding:8px 0;text-decoration:underline}
.big{font-size:46px;font-weight:800;text-align:center;margin:10px 0 4px}
.big.pass{color:var(--gold)} .big.fail{color:var(--wrong)}
.center{text-align:center}
.note{font-size:12.5px;color:var(--muted);text-align:center;margin-top:10px}
.topright{margin-left:auto;display:flex;gap:8px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">M</div>
    <div>
      <h1>EPA 608 Prep</h1>
      <div class="sub">Real-pool adaptive trainer · Type I / II / III</div>
    </div>
    <div class="topright"><button class="link" onclick="go('home')">Home</button></div>
  </header>
  <div id="view"></div>

<script>
const BANK = [{"id":"C-001","type":"C","topic":"venting-snap-sales","q":"Refrigeration technicians who violate the Clean Air Act can","options":["lose their EPA 608 certification.","be fined.","be required to appear in Federal court.","All of the above."],"answer":"All of the above.","why":"CAA violations carry certification loss, fines, and federal prosecution.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-002","type":"C","topic":"three-Rs-reclaim","q":"After 1995 supplies of CFC refrigerants used to service existing refrigeration appliances in the United States can only come from","options":["recovery and recycling.","solvent conversion.","European manufacturers.","third-world chemical companies."],"answer":"recovery and recycling.","why":"CFC production ended, so existing stock comes only from recovery/recycling.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-003","type":"C","topic":"three-Rs-reclaim","q":"Refrigerants that are recovered can be","options":["returned to the same system and other systems owned by the same person without restriction.","used in any system serviced that day.","taken to the shop and sold as used refrigerants to other customers.","called reclaimed refrigerant if a filter-drier was used during recovery."],"answer":"returned to the same system and other systems owned by the same person without restriction.","why":"Recovered refrigerant may be reused within the same owner's systems.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-004","type":"C","topic":"three-Rs-reclaim","q":"Refrigerants cannot be called \"reclaimed\" unless they","options":["were properly processed in a reclaiming machine.","have been chemically analyzed and the refrigerants meet the ARI-700 purity standard.","are recovered using equipment less than 1 year old.","are recovered from a system in service less than 1 year and still under warranty."],"answer":"have been chemically analyzed and the refrigerants meet the ARI-700 purity standard.","why":"Reclaimed = analyzed to ARI-700 purity spec.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-005","type":"C","topic":"recovery-requirements","q":"The EPA can require a technician to demonstrate the abilities to perform proper procedures for recovering and/or recycling refrigerant. Failure to demonstrate competency can result in","options":["revocation of the technicians certification.","seizure of the technicians recovery/recycling equipment.","seizure of any refrigerant purchased by the technician that they still are in possession of.","mandatory attendance at refrigeration training boot camp where they will have to run in place for 8 hours/day while holding a manifold gauge set over their head."],"answer":"revocation of the technicians certification.","why":"Inability to demonstrate competency can revoke certification.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-006","type":"C","topic":"ozone-and-regulations","q":"What characteristic of CFC refrigerants make them more likely to reach the stratosphere than most other compounds that contain chlorine?","options":["Refrigerants such as CFCs that contain chlorine but not hydrogen are so stable that they do not break down in the lower atmosphere. The chlorine (or bromine) only breaks down when it reacts with the ozone molecules up higher in the stratosphere changing it to oxygen, thus breaking the ozone layer down.","CFCs are lighter than other damaging compounds making them easier to float upward when released.","CFCs are attracted to the static in the stratosphere.","CFCs are attracted to the dust in the stratosphere."],"answer":"Refrigerants such as CFCs that contain chlorine but not hydrogen are so stable that they do not break down in the lower atmosphere. The chlorine (or bromine) only breaks down when it reacts with the ozone molecules up higher in the stratosphere changing it to oxygen, thus breaking the ozone layer down.","why":"CFC stability lets them reach the stratosphere intact.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-007","type":"C","topic":"recovery-techniques","q":"A system is considered dehydrated when","options":["the vacuum indicator shows you have reached and held the required vacuum.","the vacuum pump has run at least 5 hours.","the manifold suction gauge has held a 30 inch hg vacuum for 3 hours.","it asks you for a drink of water."],"answer":"the vacuum indicator shows you have reached and held the required vacuum.","why":"Dehydration is confirmed by holding the required vacuum level.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-008","type":"C","topic":"safety-cylinders","q":"Disposable refrigerant containers are used for ________ refrigerants.","options":["recycled","recovered","virgin / new","Both A and B"],"answer":"virgin / new","why":"Disposable (DOT-39) cylinders hold only virgin refrigerant, never recovered.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-009","type":"C","topic":"refrigerant-families","q":"Which of the following refrigerants is an HCFC?","options":["R-124","R-134a","R-410a","R-12"],"answer":"R-124","why":"R-124 is an HCFC; R-12 is CFC, R-134a/R-410a are HFC.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-010","type":"C","topic":"refrigerant-families","q":"Which of the following statements is true about an azeotrope refrigerant mixture?","options":["It is always made from just two components.","It has a pressure-temperature curve identical to one of its components.","It is a mixture made from at least three different refrigerants.","It is a mixture that acts like a single component refrigerant over its entire range."],"answer":"It is a mixture that acts like a single component refrigerant over its entire range.","why":"Azeotropes behave like a single-component refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-011","type":"C","topic":"refrigerant-families","q":"Chlorofluorocarbon (CFC) and hydrofluorocarbon (HCFC) refrigerants have which of the following in common?","options":["They have identical ODP.","They both contain hydrogen.","They have the same normal boiling points.","They both must be recovered before opening appliances for servicing or disposing of them."],"answer":"They both must be recovered before opening appliances for servicing or disposing of them.","why":"Both must be recovered before service/disposal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-012","type":"C","topic":"safety-cylinders","q":"When scrapping a disposable refrigerant cylinder, the internal cylinder pressure should be reduced to at least","options":["0 psig","15 psig","20 psig","12 psig"],"answer":"0 psig","why":"Disposable cylinders must be emptied to 0 psig before scrapping.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-013","type":"C","topic":"recovery-techniques","q":"Manifold gauge sets are usually color coded. When this is so, the high pressure gauge is","options":["yellow.","green.","red.","blue."],"answer":"red.","why":"High-side gauge is conventionally red.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-014","type":"C","topic":"recovery-techniques","q":"Generally, blended refrigerants should be charged","options":["as a vapor.","at very high temperatures.","as a liquid.","the same as any other refrigerant."],"answer":"as a liquid.","why":"Blends are liquid-charged to avoid fractionation.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-015","type":"C","topic":"refrigerant-families","q":"Blended refrigerants leak from a system","options":["faster than other refrigerants.","in uneven amounts due to to the different vapor pressures of its blends.","slower than other refrigerants.","only if a system component fails."],"answer":"in uneven amounts due to to the different vapor pressures of its blends.","why":"Differing vapor pressures cause fractionated leaking.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-016","type":"C","topic":"ozone-and-regulations","q":"Which of the following gases help form a protective shield for the earth?","options":["Propane","Chlorine","Carbon Monoxide","Stratospheric Ozone"],"answer":"Stratospheric Ozone","why":"Stratospheric ozone shields earth from UV.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-017","type":"C","topic":"refrigeration-cycle","q":"In a refrigeration system, the component that changes low-pressure vapor to high-pressure vapor is the","options":["evaporator.","TXV.","compressor.","condenser."],"answer":"compressor.","why":"The compressor raises vapor pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-018","type":"C","topic":"ozone-and-regulations","q":"Research and data show that chlorine in the stratosphere mainly comes from man-made CFC's rather than natural sources such as volcanoes because","options":["the rise in the amount of chlorine in the stratosphere matches the rise in the amount of fluorine, which has different natural sources than chlorine.","the rise in the amount of chlorine in the stratosphere matches the rise in CFC emissions.","air samples taken from the stratosphere over erupting volcanoes show that volcanoes contribute a small quantity of chlorine to the stratosphere when compared to CFCs.","All the above"],"answer":"All the above","why":"All listed evidence points to man-made CFC origin.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-019","type":"C","topic":"ozone-and-regulations","q":"Which atom in CFC molecules causes ozone depletion?","options":["Fluorine","Chlorine","Sodium","Carbon"],"answer":"Chlorine","why":"Chlorine catalytically destroys ozone.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-020","type":"C","topic":"ozone-and-regulations","q":"The ozone layer in the stratosphere protects the earth from","options":["the suns nuclear radiation.","the klingons from kronos.","ultraviolet radiation from the sun.","infrared radiation from the sun."],"answer":"ultraviolet radiation from the sun.","why":"Ozone absorbs solar UV.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-021","type":"C","topic":"safety-cylinders","q":"When using any cleaner, solvent, chemical, or refrigerant, you should review","options":["the moisture solubility information.","the chemical compound reference sheet.","the material safety data sheets.","the chemical composition reference sheets."],"answer":"the material safety data sheets.","why":"MSDS/SDS gives handling and hazard data.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-022","type":"C","topic":"venting-snap-sales","q":"A reward of up to ________ may be given to a person supplying information that leads to a penalty against a technician intentionally venting refrigerants into the atmosphere.","options":["$5,000","$10,000","$27,000","$37,000"],"answer":"$10,000","why":"EPA offers up to $10,000 for actionable venting tips.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-023","type":"C","topic":"ozone-and-regulations","q":"The Montreal Protocol is","options":["an energy efficiency test developed by the Canadian government.","a testing procedure for measuring the amount of chlorine in the stratosphere.","a procedure or protocol to test for ozone concentration in the atmosphere.","a multi-national treaty that controls the production of CFC and HCFC refrigerants."],"answer":"a multi-national treaty that controls the production of CFC and HCFC refrigerants.","why":"Montreal Protocol is the international ozone treaty.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-024","type":"C","topic":"ozone-and-regulations","q":"What is one of the most serious consequences of damaging the earths protective layer of ozone?","options":["Marine plant mutations.","An increase in volcanic activity.","An increase in the rate of human skin cancers.","An increase in natural radioactivity."],"answer":"An increase in the rate of human skin cancers.","why":"More UV raises skin cancer rates.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-1/"},{"id":"C-025","type":"C","topic":"safety-cylinders","q":"Which safety precaution(s) should always be followed?","options":["Never apply an open flame to a refrigerant cylinder.","Never cut or weld any refrigerant line while refrigerant is in the line.","Never use oxygen to purge lines or to pressurize a system.","All of the above."],"answer":"All of the above.","why":"All three are mandatory safety rules.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-026","type":"C","topic":"refrigeration-cycle","q":"In a vapor compression refrigeration system, cooling occurs when","options":["refrigerant liquid turns to a vapor.","refrigerant vapor turns to a liquid.","the refrigerant is under maximum pressure.","the refrigerant gives off heat."],"answer":"refrigerant liquid turns to a vapor.","why":"Evaporation (liquid to vapor) absorbs heat = cooling.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-027","type":"C","topic":"recovery-techniques","q":"The evacuation of a system is a method of","options":["pinpointing the location of leaks.","acid removal.","dehydration.","All of the above."],"answer":"dehydration.","why":"Evacuation removes moisture (dehydration).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-028","type":"C","topic":"ozone-and-regulations","q":"Each chlorine atom in the stratosphere can destroy _____ ozone molecules.","options":["100","1000","10,000","100,000"],"answer":"100,000","why":"One Cl atom can destroy ~100,000 ozone molecules.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-029","type":"C","topic":"refrigerant-families","q":"An example of an HFC refrigerant is","options":["R-11","R-124","R-142b","R-410a"],"answer":"R-410a","why":"R-410a is an HFC blend.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-030","type":"C","topic":"recovery-techniques","q":"Which gas(es) would cause the LEAST damage to the environment during a leak check?","options":["Dry nitrogen and R-22.","Dry nitrogen and R-12.","Compressed air and R-12.","Dry nitrogen."],"answer":"Dry nitrogen.","why":"Nitrogen alone has no ozone/warming impact.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-031","type":"C","topic":"refrigeration-cycle","q":"Refrigerant migrates to the compressor crankcase because of a difference in _______ between the refrigerant and the oil.","options":["vapor pressure","acidity","volume","density"],"answer":"vapor pressure","why":"Vapor-pressure difference drives migration into oil.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-032","type":"C","topic":"refrigerant-families","q":"Which refrigerant is an HCFC?","options":["R-22","R-134a","R-410a","R-12"],"answer":"R-22","why":"R-22 is the common HCFC.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-033","type":"C","topic":"three-Rs-reclaim","q":"It is important not to mix R-22 and R-410a refrigerants in the same container because","options":["the mixture may be impossible to reclaim.","the mixture will explode.","the mixture is corrosive.","they use different oils."],"answer":"the mixture may be impossible to reclaim.","why":"Mixed refrigerants cannot be reclaimed to spec.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-034","type":"C","topic":"recovery-requirements","q":"When using a recovery unit, the fill level of the recovery tank can be controlled by","options":["a mechanical float switch.","an electronic shutoff device.","weight.","All of the above."],"answer":"All of the above.","why":"Float, electronic shutoff, and weight all control fill level.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-035","type":"C","topic":"venting-snap-sales","q":"Which of the following refrigerant releases is a violation of the EPA prohibition on venting?","options":["Release of (incomplete in source)","Release of mixtures of nitrogen and refrigerant that result from adding nitrogen to a fully charged appliance while leak-checking that appliance.","Refrigerants emitted in the course of normal operation of an appliance."],"answer":"Release of mixtures of nitrogen and refrigerant that result from adding nitrogen to a fully charged appliance while leak-checking that appliance.","why":"Releasing nitrogen mixed with refrigerant counts as illegal venting.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-036","type":"C","topic":"ozone-and-regulations","q":"Which of the following human health effects could result from an increase in ultraviolet radiation?","options":["An increase in eye cataracts cases.","An increase in male infertility cases.","An increase in heat prostration with the elderly.","An increase in the number of thyroid disorders."],"answer":"An increase in eye cataracts cases.","why":"More UV raises cataract incidence.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-037","type":"C","topic":"safety-cylinders","q":"Never use an open flame to heat a refrigerant tank because","options":["it can result in venting refrigerant to the atmosphere.","the tank may explode causing serious injury to people nearby.","refrigerant in the tank may decompose, forming a toxic material.","All of the above."],"answer":"All of the above.","why":"Open flame risks venting, explosion, and toxic decomposition.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-038","type":"C","topic":"leak-rates-recordkeeping","q":"When transporting cylinders containing used refrigerant, the DOT requires that you","options":["use OSHA-approved containers.","attach DOT classification tags.","ship using an EPA certified carrier.","All the above."],"answer":"attach DOT classification tags.","why":"DOT requires classification tags on transported cylinders.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-039","type":"C","topic":"safety-cylinders","q":"According to ASHRAE's 1992 refrigerant safety classification, which of the following designations would be the most safe?","options":["A-1","A-3","B-1","B-3"],"answer":"A-1","why":"A1 = lowest toxicity and no flame propagation.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-040","type":"C","topic":"recovery-techniques","q":"The over-evacuation of a system","options":["can cause tube, condenser, and/or evaporator collapse.","damages vacuum gauge sets.","causes vacuum pump damage.","does not occur."],"answer":"does not occur.","why":"A vacuum cannot go below zero absolute, so over-evacuation is not possible.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-041","type":"C","topic":"recovery-requirements","q":"Equipment covered by EPA regulations include","options":["only refrigerators and freezers using CFCs.","only air-conditioning and refrigeration equipment containing and using HCFC refrigerants.","all air-conditioning and refrigeration equipment using CFC, HCFC, or HFC refrigerants.","only commercial air-conditioning and refrigeration equipment made in the USA."],"answer":"all air-conditioning and refrigeration equipment using CFC, HCFC, or HFC refrigerants.","why":"Regulations cover all CFC/HCFC/HFC equipment.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-042","type":"C","topic":"safety-cylinders","q":"Never overfill refrigerant storage cylinders because","options":["the cylinder may be too heavy to carry.","the internal pressure of the cylinders may rise in heated areas and cause an explosion.","some refrigerant may be vented as the cylinder valve is closed.","the extra space in the cylinder may be needed for the next job."],"answer":"the internal pressure of the cylinders may rise in heated areas and cause an explosion.","why":"Overfilled cylinders can hydrostatically rupture when heated.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-043","type":"C","topic":"three-Rs-reclaim","q":"It is important not to mix different refrigerants in the same container because","options":["the mixture may be impossible to reclaim.","the mixture will explode.","the refrigerant mixture might be toxic.","it violates EPA environmental regulations."],"answer":"the mixture may be impossible to reclaim.","why":"Mixed refrigerants cannot be reclaimed to ARI-700.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-044","type":"C","topic":"recovery-techniques","q":"Manifold gauge sets are often color coded. When they are, the low pressure gauge is colored","options":["red.","white.","blue.","yellow."],"answer":"blue.","why":"Low-side gauge is conventionally blue.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-045","type":"C","topic":"recovery-requirements","q":"All devices used for refrigerant recovery must","options":["be portable and weigh less than 100 pounds.","contain a heavy-duty ozone shield.","have a 5-ton refrigeration rating at 100F.","meet EPA standards."],"answer":"meet EPA standards.","why":"Recovery devices must meet EPA certification standards.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-046","type":"C","topic":"safety-cylinders","q":"Reusable refrigerant containers that are normally under any pressure above 15 psig, must be hydrostatically tested and date stamped every","options":["1 year.","2 years.","3 years.","5 years."],"answer":"5 years.","why":"DOT requires reusable cylinder retest every 5 years.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-047","type":"C","topic":"recovery-requirements","q":"Which refrigerant(s) must be recovered before opening a system or disposing of a system","options":["R-410a","R-407c","R-134a","All refrigerants must be recovered."],"answer":"All refrigerants must be recovered.","why":"EPA requires recovery of all refrigerants before opening/disposal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-048","type":"C","topic":"recovery-techniques","q":"To obtain an accurate vacuum reading during system evacuation, the system vacuum gauge should be located","options":["at the pump discharge.","as far from the vacuum pump as possible.","directly at the pump suction.","anywhere in the evacuation service hose."],"answer":"as far from the vacuum pump as possible.","why":"Placing the gauge away from the pump reads true system vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-049","type":"C","topic":"ozone-and-regulations","q":"What is the best proof of CFCs in the stratosphere?","options":["The theory of some professors in California.","The measurement of CFCs in fog.","The measurement of CFCs in air samples from the stratosphere.","The measurement of other man-made compounds in air samples from the stratosphere."],"answer":"The measurement of CFCs in air samples from the stratosphere.","why":"Direct stratospheric air sampling is the strongest proof.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-2/"},{"id":"C-050","type":"C","topic":"three-Rs-reclaim","q":"The recovery of refrigerants is necessary to","options":["maintain adequate supplies for service calls after production bans","prevent the venting of refrigerants to the atmosphere","prevent stratospheric ozone depletion","All of the above"],"answer":"All of the above","why":"Recovery serves supply, anti-venting, and ozone-protection goals.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-051","type":"C","topic":"recovery-techniques","q":"A compound pressure gauge, typically used on the low side of the system, measures pressure in","options":["psia","torrs and microns","psig and inches of mercury","psia and microns"],"answer":"psig and inches of mercury","why":"Compound gauge reads psig above zero and inches Hg vacuum below.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-052","type":"C","topic":"three-Rs-reclaim","q":"________ refers to the process of cleaning refrigerant by oil separation and single or multiple passes through filter-driers, which reduces moisture and acidity","options":["Recycling","Recovering","Reclaiming","Restoring"],"answer":"Recycling","why":"Recycling = field cleanup via oil separation and filter-driers.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-053","type":"C","topic":"recovery-techniques","q":"The high-pressure gauge on service manifold sets have a continuous scale, usually calibrated to read from","options":["200 microns to 0 psi","0 to 20 psi","0 to 500 psi","200 psi to 700 psi"],"answer":"0 to 500 psi","why":"High-side gauges typically span 0 to ~500 psi.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-054","type":"C","topic":"three-Rs-reclaim","q":"________ is the process that returns refrigerant to new-product specifications that requires chemical analysis","options":["Recovery","Recycling","Reclaiming","Reconditioning"],"answer":"Reclaiming","why":"Reclaiming returns refrigerant to new-spec with chemical analysis.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-055","type":"C","topic":"safety-cylinders","q":"A cylinder with a gray body and a yellow top indicate that the cylinder is designed to hold","options":["nitrogen","inert gas","only R-12","recovered refrigerant"],"answer":"recovered refrigerant","why":"Gray body / yellow top marks recovered-refrigerant cylinders.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-056","type":"C","topic":"refrigerant-families","q":"HCFC refrigerants are","options":["more harmful to stratospheric ozone than CFCs","do not damage stratospheric ozone in any way","less harmful to stratospheric ozone than CFCs","more harmful than bromine-containing compounds"],"answer":"less harmful to stratospheric ozone than CFCs","why":"HCFCs have lower ODP than CFCs due to hydrogen content.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-057","type":"C","topic":"ozone-and-regulations","q":"Which type of refrigerant is the most harmful to stratospheric ozone?","options":["Refrigerants containing bromine","Refrigerants containing chlorine","Refrigerants containing hydrogen","Refrigerants containing fluoride"],"answer":"Refrigerants containing bromine","why":"Bromine is more destructive to ozone than chlorine.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-058","type":"C","topic":"leak-rates-recordkeeping","q":"According to the EPA, a ________ leak detection method is considered to be the most effective for locating the general area of a small leak","options":["standing vacuum test","electronic or ultrasonic tester","halide torch","audible sound"],"answer":"electronic or ultrasonic tester","why":"Electronic/ultrasonic detectors best locate small leaks.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-059","type":"C","topic":"recovery-techniques","q":"Long hoses between the unit and the recovery machine should not be used because they cause","options":["excessive pressure drop","increased recovery time","increased emissions","All of the above"],"answer":"All of the above","why":"Long hoses cause pressure drop, slow recovery, and more emissions.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-060","type":"C","topic":"recovery-requirements","q":"Recovery equipment that relies upon the compressor in the system would be considered","options":["system-dependent","self-contained","system-independent","self-sufficient"],"answer":"system-dependent","why":"System-dependent recovery uses the appliance's own compressor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-061","type":"C","topic":"recovery-techniques","q":"A hermetic compressor must never be operated when","options":["the compressor is operating under light load","the compressor is operating under full load","there is a dehydration vacuum in the system","the outdoor temperature is above 125F"],"answer":"there is a dehydration vacuum in the system","why":"Running a hermetic motor under deep vacuum can arc and burn windings.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-062","type":"C","topic":"recovery-techniques","q":"Systems charged with R-410a should be leak checked with","options":["CFC's","HCFCs","pressurized nitrogen","compressed dry air"],"answer":"pressurized nitrogen","why":"Use nitrogen (not air/refrigerant) to pressure-test for leaks.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-063","type":"C","topic":"refrigerant-families","q":"R-410a is not a typical blended refrigerant because","options":["it is a near azeotropic refrigerant","it can be charged as either a liquid or vapor","while it has a 400 series refrigerant number, it behaves like a 500 series refrigerant","All of the above are true"],"answer":"All of the above are true","why":"R-410a is near-azeotropic with negligible glide.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-064","type":"C","topic":"refrigerant-families","q":"A ternary refrigerant blend is a __________ mixture","options":["two-part","three-part","four-part","five-part"],"answer":"three-part","why":"Ternary = three components.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-065","type":"C","topic":"refrigeration-cycle","q":"In a refrigeration system, high pressure vapor is converted to high pressure liquid in the","options":["liquid receiver","TXV","suction line accumulator","condenser"],"answer":"condenser","why":"The condenser rejects heat, condensing vapor to liquid.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-066","type":"C","topic":"substitutes-phaseout","q":"Which of the following is an approved \"drop-in\" service replacement for R-12?","options":["HFC-134a","HFC-410a","HFC-407c","According to the EPA there are no"],"answer":"According to the EPA there are no","why":"EPA recognizes no true drop-in replacement for R-12.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-067","type":"C","topic":"safety-cylinders","q":"The proper method of discarding a disposable refrigerant cylinder is to","options":["bleed the refrigerant to the ambient and toss the cylinder in a commercial dumpster","assure that all refrigerant is recovered and that the cylinder is rendered useless, then recycle the metal","refill the cylinder a second time at an approved facility","give the cylinder to a friend to be used as a compressed air tank"],"answer":"assure that all refrigerant is recovered and that the cylinder is rendered useless, then recycle the metal","why":"Recover contents, depressurize, render useless, then scrap the metal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-068","type":"C","topic":"refrigerant-families","q":"CFC refrigerants are so named because they contain the elements","options":["chlorine, fluorine, and carbon","chlorine, fluorine, and calcium","carbon, fluoride, and calcium","chlorine, fluorine, and hydrogen"],"answer":"chlorine, fluorine, and carbon","why":"CFC = Chlorine, Fluorine, Carbon.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-069","type":"C","topic":"recovery-requirements","q":"Before you dispose of any system containing a refrigerant, you must","options":["recover the refrigerant","purge the system with nitrogen","flush the system with R-11 or R-113","seal the system so no refrigerant can escape during disposal"],"answer":"recover the refrigerant","why":"Refrigerant must be recovered before disposal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-070","type":"C","topic":"recovery-techniques","q":"According to EPA regulations, which of the following procedures is not an approved technique for system cleanup after a burnout?","options":["Installing a suction line filter-drier","Flushing with liquid refrigerant to clean tubing","Triple evacuation","Deep vacuum evacuation"],"answer":"Flushing with liquid refrigerant to clean tubing","why":"Flushing with refrigerant is not an EPA-approved cleanup method.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-071","type":"C","topic":"safety-cylinders","q":"When using nitrogen to pressurize a system, you should always","options":["charge nitrogen as a liquid","charge through a pressure regulator","pressurize to above 1000 pounds","never use nitrogen within the system"],"answer":"charge through a pressure regulator","why":"High-pressure nitrogen must be regulated to safe pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-072","type":"C","topic":"ozone-and-regulations","q":"What effects can ozone depletion have on the environment?","options":["Reduced crop yields","Reduced marine life","Increased ground-level ozone","All of the above"],"answer":"All of the above","why":"Ozone loss harms crops, marine life, and raises ground-level ozone.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-073","type":"C","topic":"refrigerant-families","q":"Non-azeotropic refrigerants leak from a system","options":["faster than other refrigerants","in uneven amounts due to different vapor pressures","slower than other refrigerants","only if the joint fails completely"],"answer":"in uneven amounts due to different vapor pressures","why":"Zeotropic blends fractionate, leaking unevenly.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-3/"},{"id":"C-074","type":"C","topic":"refrigerant-families","q":"An example of an HCFC refrigerant is","options":["R-410a","R-22","R-114","R-717"],"answer":"R-22","why":"R-22 is an HCFC.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-075","type":"C","topic":"ozone-and-regulations","q":"Which chemicals are controlled by the Montreal Protocol?","options":["Chlorofluorocarbons","Hydrochlorofluorocarbons","Halons","All of the above"],"answer":"All of the above","why":"The Protocol controls CFCs, HCFCs, and halons.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-076","type":"C","topic":"recovery-techniques","q":"Systems charged with R-134a should be leak-checked with","options":["CFCs","HCFCs","compressed dry air","pressurized nitrogen"],"answer":"pressurized nitrogen","why":"Nitrogen is the proper leak-check pressurant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-077","type":"C","topic":"recovery-techniques","q":"When evacuating a system, the hoses should be","options":["orange in color for safety reasons","as long as possible","smaller than vacuum pump inlet connection","equal to or larger than vacuum pump inlet connection"],"answer":"equal to or larger than vacuum pump inlet connection","why":"Larger hoses reduce restriction and speed evacuation.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-078","type":"C","topic":"venting-snap-sales","q":"It has been illegal to vent substitutes for CFC and HCFC refrigerants since","options":["June 1 1992","July 15 1993","November 1993","November 1995"],"answer":"November 1995","why":"Venting of substitutes banned November 1995.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-079","type":"C","topic":"safety-cylinders","q":"Never use oxygen or compressed air to pressurize a system because","options":["when mixed with compressor oil or some refrigerants, it could explode","leaking oxygen or compressed air is more difficult to detect than nitrogen","the pressures produced by either oxygen or compressed air are not as good as nitrogen pressures","oxygen and compressed air do not mix with refrigerants"],"answer":"when mixed with compressor oil or some refrigerants, it could explode","why":"Oxygen + oil/refrigerant can detonate.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-080","type":"C","topic":"safety-cylinders","q":"Refrigerant cylinders should always be","options":["free of rust and damage","color-coded to indicate the contents","secure","All of the above"],"answer":"All of the above","why":"Cylinders must be undamaged, color-coded, and secured.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-081","type":"C","topic":"safety-cylinders","q":"Even though R-22 is considered non-toxic, it","options":["is lighter than air","can cause asphyxia","is a Class I refrigerant","can be detected by its color"],"answer":"can cause asphyxia","why":"Refrigerant displaces oxygen, causing asphyxiation.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-082","type":"C","topic":"recovery-techniques","q":"A system is dehydrated to","options":["remove oil and oil vapor","remove water and water vapor","remove refrigerant and refrigerant vapor","None of the above"],"answer":"remove water and water vapor","why":"Dehydration removes moisture from the system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-083","type":"C","topic":"substitutes-phaseout","q":"According to the EPA, of the refrigerants listed below, which types will not contribute to global warming?","options":["CFCs","HCFCs","HFCs","They all contribute to global warming"],"answer":"They all contribute to global warming","why":"CFCs, HCFCs, and HFCs are all greenhouse gases.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-084","type":"C","topic":"refrigerant-families","q":"The type of oil that is most commonly used in stationary air-conditioning applications with HFC-410a refrigerant is","options":["ester oil","alkylbenzene oil","mineral oil","All oils are compatible with HFC-410a"],"answer":"ester oil","why":"POE (ester) oil is used with HFC refrigerants like R-410a.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-085","type":"C","topic":"recovery-requirements","q":"Technicians receiving a passing grade on the Type II (medium-pressure, high-pressure, very high-pressure) exam are certified to recover refrigerant during the maintenance, service, and repair of medium/high/very high pressure equipment including the following:","options":["CFC-13","HFC-410a","CFC-503","With Type II certification, you are certified for all high-pressure refrigerants including CFC-13 and CFC-503"],"answer":"With Type II certification, you are certified for all high-pressure refrigerants including CFC-13 and CFC-503","why":"Type II covers all high-pressure refrigerants.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-086","type":"C","topic":"safety-cylinders","q":"Personal protective equipment (gloves, safety glasses, safety shoes, etc) should always be worn when","options":["reporting for work","handling and filling refrigerant cylinders","climbing ladders","lifting"],"answer":"handling and filling refrigerant cylinders","why":"PPE is required when handling/filling cylinders.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-087","type":"C","topic":"safety-cylinders","q":"Refrigerant vapors or mist should not be inhaled because","options":["they are addictive","they can lower the bodies core temperature","they may cause skin cancer","they may cause heart irregularities and/or unconsciousness"],"answer":"they may cause heart irregularities and/or unconsciousness","why":"Inhaling refrigerant can cause cardiac arrhythmia and unconsciousness.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-088","type":"C","topic":"leak-rates-recordkeeping","q":"Of the items listed below, which is (are) violations of the Clean Air Act?","options":["Falsifying or failing to keep required records","Failing to reach required evacuation levels before opening or disposing of appliances","Knowingly releasing CFC or HCFC refrigerants or their substitutes while repairing appliances","All of the above"],"answer":"All of the above","why":"All three are CAA violations.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-089","type":"C","topic":"refrigerant-families","q":"HFC refrigerants contain","options":["helium, fluorine, and carbon","helium, fluorine, and calcium","hydrogen, fluorine, and chlorine","hydrogen, fluorine, and carbon"],"answer":"hydrogen, fluorine, and carbon","why":"HFC = Hydrogen, Fluorine, Carbon (no chlorine).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-090","type":"C","topic":"refrigerant-families","q":"Which refrigerant contains an HCFC?","options":["R-12","R-22","R-134a","R-410a"],"answer":"R-22","why":"R-22 is the HCFC.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-091","type":"C","topic":"recovery-requirements","q":"Recovery equipment that relies upon the pressure of the refrigerant in the appliance would be considered","options":["system-dependent","self-contained","illegal","self-sufficient"],"answer":"system-dependent","why":"Using the appliance's own pressure = system-dependent.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-092","type":"C","topic":"refrigeration-cycle","q":"Refrigerant that enters the compressor, under normal operating conditions, is a","options":["low pressure vapor","low pressure liquid","high pressure liquid","high pressure vapor"],"answer":"low pressure vapor","why":"Suction gas entering the compressor is low-pressure vapor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-093","type":"C","topic":"leak-rates-recordkeeping","q":"It is necessary to place a refrigerant label on","options":["a refrigerant cylinder which is being returned for reclaiming","a cylinder to identify the pressure","a truck to identify cylinder hauler","a cylinder to identify gross weight"],"answer":"a refrigerant cylinder which is being returned for reclaiming","why":"Cylinders returned for reclaim must be labeled with contents.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-094","type":"C","topic":"refrigerant-families","q":"Which refrigerant contains a CFC?","options":["R-500","R-410a","R-134a","R-123"],"answer":"R-500","why":"R-500 is a CFC-containing azeotrope.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-095","type":"C","topic":"recovery-techniques","q":"Use ________ to remove ice from a sight glass.","options":["an alcohol spray","water","R-11 refrigerant","a screw driver or flat file"],"answer":"an alcohol spray","why":"Alcohol spray safely melts ice from a sight glass.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-096","type":"C","topic":"leak-rates-recordkeeping","q":"According to the EPA, an oil sample should be taken for which of the following reasons?","options":["A new filter-drier has been installed","The system had a leak or a major component failure","The system is not cooling properly","Recycled refrigerant was added to the system"],"answer":"The system had a leak or a major component failure","why":"Oil sampling is warranted after a leak or major failure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-097","type":"C","topic":"recovery-requirements","q":"The EPA requires the installation of a service aperture or process stub on all appliances using a Class I or Class II substance as a refrigerant. The main purpose of this requirement is to make it easier to","options":["recover refrigerant","change the compressor lubrication","vent noncondensables","dehydrate the system"],"answer":"recover refrigerant","why":"Process stubs ease refrigerant recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-098","type":"C","topic":"recovery-requirements","q":"Recycling and recovery equipment intended for use with air-conditioning and refrigeration equipment (except for small appliances) must be tested under","options":["ARI 700","ARI 740","EPA 700","UL 740"],"answer":"ARI 740","why":"Recovery/recycle equipment is certified to ARI 740.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-4/"},{"id":"C-099","type":"C","topic":"refrigeration-cycle","q":"Refrigerant entering the compressor of a refrigeration system is a","options":["liquid","subcooled liquid","subcooled vapor","superheated vapor"],"answer":"superheated vapor","why":"Suction gas is slightly superheated vapor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-100","type":"C","topic":"ozone-and-regulations","q":"What is being done in the U.S. to stop damage to the stratospheric ozone layer?","options":["Replacing coal-fired power plants for electricity production","Capturing and ultimately eliminating use of chlorofluorocarbons","Enforcing strict emission requirements on garbage incinerators","All of the above"],"answer":"Capturing and ultimately eliminating use of chlorofluorocarbons","why":"Phasing out and capturing CFCs protects the ozone layer.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-101","type":"C","topic":"refrigerant-families","q":"The type of oil most commonly used in stationary refrigeration applications with HFC-134a refrigerant is","options":["ester oil","alkylbenzene oil","mineral oil","All oils are compatible with HFC-134a"],"answer":"ester oil","why":"POE (ester) oil pairs with HFC-134a.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-102","type":"C","topic":"refrigerant-families","q":"The term used to describe that a refrigerant blend has a range of boiling or condensing points at constant pressure is","options":["pressure slide","mixture slump","fractionation","temperature glide"],"answer":"temperature glide","why":"Temperature glide = boiling/condensing range of a blend.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-103","type":"C","topic":"three-Rs-reclaim","q":"Under EPA's regulations, what standard must reclaimed refrigerant meet before resale?","options":["ARI 700","ARI 740","EPA 700","UL 740"],"answer":"ARI 700","why":"Reclaimed refrigerant must meet ARI 700 purity.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-104","type":"C","topic":"venting-snap-sales","q":"It is illegal to","options":["use CFC refrigerants","manufacture or import HFC refrigerants into the U.S.","knowingly release refrigerant during service, maintenance, repair, or disposal of appliances with exception of de minimis releases","Do any of the above"],"answer":"knowingly release refrigerant during service, maintenance, repair, or disposal of appliances with exception of de minimis releases","why":"Knowing venting (beyond de minimis) is the illegal act.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-105","type":"C","topic":"ozone-and-regulations","q":"Which type of refrigerant is most harmful to stratospheric ozone?","options":["CFC","HCFC","HFC","Ammonia"],"answer":"CFC","why":"CFCs have the highest ozone-depletion potential.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-106","type":"C","topic":"refrigeration-cycle","q":"Refrigerant entering the expansion or throttling device (metering device) is a","options":["saturated vapor","superheated vapor","mixture of vapor and liquid","liquid"],"answer":"liquid","why":"High-pressure liquid enters the metering device.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-107","type":"C","topic":"three-Rs-reclaim","q":"Which statements represent good service practices for conserving refrigerant?","options":["Recover or recycle refrigerant","Keep systems tight","Find and repair leaks","All of the above"],"answer":"All of the above","why":"Recover/recycle, tight systems, and leak repair all conserve refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"C-108","type":"C","topic":"recovery-requirements","q":"Under EPA's \"safe disposal requirement,\" who is responsible for ensuring refrigerant removal from household refrigerators before disposal?","options":["final person in the disposal chain","service technician that last worked on the appliance","manager of the service company that last performed work","EPA field inspectors"],"answer":"final person in the disposal chain","why":"The last person in the disposal chain must ensure recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/core/core-practice-test-5/"},{"id":"I-001","type":"I","topic":"safety","q":"At high temperatures (for example open flames and glowing metal surfaces) R-12 and R-22 can decompose to form","options":["hydrozine gas","helium gas","phosgene gas","All of the above will be formed"],"answer":"phosgene gas","why":"CFC/HCFC refrigerants thermally decompose into phosgene and other toxic byproducts.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-002","type":"I","topic":"regulations-recordkeeping","q":"If the EPA regulations should change after a technician becomes certified","options":["the technician certification is grandfathered for six months to allow time for taking the recertification exam","a new certification test must be taken within 90 days to be recertified","then they may as well just throw their hands up in the air and go to the coffee shop and hang out eating jelly donuts","it is the technicians responsibility to comply with any future changes in the law"],"answer":"it is the technicians responsibility to comply with any future changes in the law","why":"Technicians are responsible for compliance with current and future regulations.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-003","type":"I","topic":"refrigerant-id-substitution","q":"Which of the following refrigerants is most commonly used as a replacement for R-12 in new household refrigerators?","options":["R-123","R-24","R-141a / 141b blend","R-134a"],"answer":"R-134a","why":"R-134a is the standard non-CFC replacement for R-12 in new household refrigeration.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-004","type":"I","topic":"recovery-equipment-requirements","q":"Recovery equipment used for the service or repair of small appliances must be certified by an EPA-approved laboratory if the recovery equipment was manufactured after","options":["May 15 1993","June 15 1992","July 15 1993","November 15 1993"],"answer":"November 15 1993","why":"Post-Nov 15 1993 recovery equipment must be lab-certified to EPA standards.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-005","type":"I","topic":"definitions-scope","q":"What is the maximum allowable factory charge of refrigerant for Type I appliances?","options":["4 pounds","5 pounds","7 pounds","10 pounds"],"answer":"5 pounds","why":"A small appliance is defined as factory-charged with 5 pounds or less.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-006","type":"I","topic":"recovery-levels","q":"Why is it important to obtain an accurate pressure reading of refrigerant inside a recovery cylinder?","options":["The pressure reading along with a temperature reading can indicate if there is excessive air or other non-condensibles in the cylinder","The pressure reading can indicate the remaining cylinder capacity","The pressure reading can indicate if the refrigerant has been damaged","Both A and C"],"answer":"The pressure reading along with a temperature reading can indicate if there is excessive air or other non-condensibles in the cylinder","why":"Pressure compared to P-T chart at a given temperature reveals non-condensables.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-007","type":"I","topic":"recovery-levels","q":"Recovery devices that were manufactured after November 15 1993 and are used for the recovery of refrigerant from small appliances must be capable of","options":["recovering 90% of the refrigerant when the compressor is operating or achieving a 4 inch vacuum under the conditions of ARI 740-1993","recovering 80% of the refrigerant when the compressor is operating","recovering 95% of the refrigerant when the compressor is operating or achieving a 4 inch vacuum under the conditions of ARI 740-1993","recovering 85% of the refrigerant when the compressor is operating"],"answer":"recovering 90% of the refrigerant when the compressor is operating or achieving a 4 inch vacuum under the conditions of ARI 740-1993","why":"Post-1993 small-appliance recovery: 90% with operating compressor or 4 in. vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-008","type":"I","topic":"access-valves-piercing","q":"Solderless piercing valves should not remain installed on refrigeration systems after completion of repairs because","options":["they are too expensive to remain on every product","they tend to leak over time","they become loose and vibrate","Both A and C"],"answer":"they tend to leak over time","why":"Piercing access valves are not a permanent seal and leak over time.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-009","type":"I","topic":"safety","q":"Whenever nitrogen is used to pressurize or blow debris out of a system,","options":["only nitrogen vapor should be used","only liquid nitrogen should be used","either liquid or vapor nitrogen can be used","nitrogen can only be used if mixed with R-22"],"answer":"only nitrogen vapor should be used","why":"Only dry nitrogen vapor is used; liquid nitrogen is dangerous and improper.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-010","type":"I","topic":"recovery-technique-compressor","q":"What can cause excessive pressure on the high side of an active self-contained recovery device?","options":["A closed recovery tank inlet valve","Excessive air or other non-condensables in the recovery tank","A closed recovery tank outlet valve","Either A or B"],"answer":"Either A or B","why":"A closed inlet valve or non-condensables both raise discharge pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-011","type":"I","topic":"disposal","q":"Portable refillable tanks or containers used to ship recovered refrigerants must meet what standard(s)?","options":["Department of Transportation (DOT)","Community Right-to-Know Act","Underwriters Laboratories (UL)","All of the above"],"answer":"Department of Transportation (DOT)","why":"Shipping containers for recovered refrigerant must meet DOT standards.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-012","type":"I","topic":"recovery-levels","q":"A recovery cylinder which is half full of recovered R-22 at normal room temperature (about 75F), in the absence of non-condensables will be pressurized to","options":["250 psig","200 psig","175 psig","130 psig"],"answer":"130 psig","why":"R-22 saturation pressure at 75F is about 130 psig per the P-T chart.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-013","type":"I","topic":"refrigerant-id-substitution","q":"Before beginning a refrigerant recovery procedure it is ALWAYS necessary to","options":["allow the system to stabilize","determine the type of refrigerant in the system","move the system to an outdoor location","disconnect the appliance from its power source"],"answer":"determine the type of refrigerant in the system","why":"You must identify the refrigerant first to avoid cross-contaminating recovery cylinders.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-014","type":"I","topic":"refrigerant-id-substitution","q":"Which of the following refrigerants must be recovered with equipment currently regulated by the equipment certification requirements of the EPA under section 608?","options":["Sulfur Dioxide","Methyl Chloride","Methyl Formate","R-12"],"answer":"R-12","why":"R-12 is an ozone-depleting refrigerant regulated under Section 608.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-015","type":"I","topic":"safety","q":"In the event of a large release of R-12 or R-22 in a contained area, which of the following is true?","options":["Safety goggle and lined butyl gloves are all that is needed","Self-contained breathing apparatus (SCBA) or leaving the area is required","Respiratory protection is not required as these gases are not toxic","Dust masks are sufficient protection against harmful vapors"],"answer":"Self-contained breathing apparatus (SCBA) or leaving the area is required","why":"Large releases displace oxygen; SCBA or evacuation is required.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-016","type":"I","topic":"recovery-equipment-requirements","q":"According to the EPA which recovery equipment maintenance procedure(s) should be performed on a regular basis?","options":["Check recovery device for refrigerant leaks","Check vacuum pumps for any leaks","Check amperage draw of recovery device","All of the above"],"answer":"Check recovery device for refrigerant leaks","why":"EPA recommends routinely checking recovery equipment for refrigerant leaks.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-017","type":"I","topic":"safety","q":"Small amounts of refrigerant are odorless, so if a pungent odor is detected during a system recovery or repair,","options":["it is the characteristic smell of the oil","the refrigerant should not be recovered","a compressor burnout has likely occurred","Dudes... Dudettes... None of these answers be talkin' truth"],"answer":"a compressor burnout has likely occurred","why":"A pungent acid odor signals a compressor burnout producing acids.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-018","type":"I","topic":"recovery-technique-compressor","q":"When recovering refrigerant into a non-pressurized container from a refrigerator with an inoperative compressor","options":["it is only necessary to recover as much refrigerant as will naturally flow out of the system","it is not necessary to recover any refrigerant since it is probably contaminated","it is necessary to drive any refrigerant from the oil by using pressurized dry nitrogen","it is necessary to heat and strike the compressor with a rubber mallet"],"answer":"it is necessary to heat and strike the compressor with a rubber mallet","why":"With a dead compressor, heating/striking helps drive refrigerant from the oil.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-019","type":"I","topic":"safety","q":"Large spills of refrigerants can cause suffocation because","options":["they have a strong odor and make breathing difficult","they are lighter than air and cause dizziness","they sting the nose and cause sneezing","they are heavier than air and displace the oxygen"],"answer":"they are heavier than air and displace the oxygen","why":"Refrigerant vapor is heavier than air and displaces breathable oxygen.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-020","type":"I","topic":"definitions-scope","q":"Which of the following is not a Type I appliance?","options":["An MVAC system that holds three pounds of R-12","A water cooler that holds 13 ounces of R-12","A food freezer that holds 22 ounces of R-22","A dehumidifier with 7 ounces of R-500"],"answer":"An MVAC system that holds three pounds of R-12","why":"Motor vehicle A/C is covered under Section 609, not Type I.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-021","type":"I","topic":"refrigerant-id-substitution","q":"When R-500 is recovered from an appliance it","options":["can be mixed with either R-22 or R-12 during the recovery process since R-500 is actually a mixture of those two refrigerants","can be mixed with R-12 but not R-22 during the recovery process","need not be recovered since R-500 is not one of the refrigerants covered by the Clean Air Act","must be recovered into its own recovery vessel or a recovery cylinder that already contains R500"],"answer":"must be recovered into its own recovery vessel or a recovery cylinder that already contains R500","why":"Refrigerants must never be mixed; R-500 needs its own dedicated cylinder.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-022","type":"I","topic":"safety","q":"When you connect a manifiold set to check system pressures, it is always a good idea to","options":["release refrigerant to smell for acid","use equipment such as hand valves or self-sealing hoses to minimize any release","recover refrigerant and recharge to specifications even when no repairs are needed","use recovery equipment to gain access to the system during testing"],"answer":"use equipment such as hand valves or self-sealing hoses to minimize any release","why":"Low-loss/self-sealing fittings minimize venting during connection.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-023","type":"I","topic":"access-valves-piercing","q":"The EPA requires that all appliances be equipped with a service aperture or other device to be used when adding or removing refrigerant from appliances. For small appliances this service port is typically","options":["a straight piece of tubing called a Process Tube where the system can be entered using a piercing access valve","located 15 inches below the compressor","installed at the factory and is 1/4 inch diameter with machine threads","not present because small appliances are exempt from this requirement"],"answer":"a straight piece of tubing called a Process Tube where the system can be entered using a piercing access valve","why":"Small appliances are accessed via the process tube using a piercing valve.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-024","type":"I","topic":"definitions-scope","q":"Anyone who recovers refrigerant during the maintenance, service or repair of small appliances must be certified as a Universal Technician or a","options":["Type I Technician","Type II Technician","Type III Technician","Core Technician"],"answer":"Type I Technician","why":"Small appliance work requires Type I (or Universal) certification.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-025","type":"I","topic":"passive-vs-active-recovery","q":"EPA regulations require the capture of at least 80 percent of the refrigerant from a small appliance with a non-operating compressor if the technician is using","options":["a system-dependent (passive) recovery unit","a self-contained (active) recovery unit","either type of recovery unit","Refrigerant recovery from inoperable systems is not required"],"answer":"either type of recovery unit","why":"The 80% requirement (dead compressor) applies regardless of recovery unit type.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-1/"},{"id":"I-026","type":"I","topic":"passive-vs-active-recovery","q":"When using a passive system-dependent recovery method on an appliance with an operating compressor, you should run that appliances compressor","options":["on 240 volts while recovering the refrigerant from the capillary tube.","for several minutes, shutting it off, then recover the refrigerant from the high side.","and recover the refrigerant from the high side.","for several minutes, shutting it off, then recover the refrigerant from the low side."],"answer":"for several minutes, shutting it off, then recover the refrigerant from the low side.","why":"Running then recovering from the low side draws refrigerant out efficiently.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-027","type":"I","topic":"passive-vs-active-recovery","q":"A passive system-dependent recovery device for small appliances","options":["never needs the use of a pump, compressor, or heat to recover the refrigerant.","mus
