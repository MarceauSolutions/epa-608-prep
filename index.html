t use a pressure-relief device when recovering refrigerant.","captures refrigerant in a non-pressurized container.","can only be performed on a system with an operating compressor."],"answer":"captures refrigerant in a non-pressurized container.","why":"Passive recovery relies on the system's own pressure into a non-pressurized container.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-028","type":"I","topic":"sales-restrictions","q":"The sale of CFC and HCFC refrigerants is","options":["banned.","limited by law to equipment owners of commercial equipment.","allowed only if the quantity is less than pounds.","restricted to technicians who are EPA certified in refrigerant recovery."],"answer":"restricted to technicians who are EPA certified in refrigerant recovery.","why":"Sales of these refrigerants are restricted to EPA-certified technicians.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-029","type":"I","topic":"refrigerant-id-substitution","q":"Which of the refrigerants listed below should be recovered with current EPA-approved recovery devices?","options":["Ammonia","Hydrogen","Water","None of the above"],"answer":"None of the above","why":"Ammonia, hydrogen, and water are not Section 608-regulated refrigerants.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-030","type":"I","topic":"leak-repair","q":"When servicing a small appliance with a leak","options":["it is mandatory to repair the leak within 30 days.","it is mandatory to repair the leak if more than 35 percent of the charge escapes within a 12-month period.","it is not mandatory to repair the leak but doing so is most responsible.","Both A and B."],"answer":"it is not mandatory to repair the leak but doing so is most responsible.","why":"Small appliance leak-repair is not mandated by EPA, but repair is responsible practice.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-031","type":"I","topic":"passive-vs-active-recovery","q":"For which of the following refrigeration systems/appliances would it be permissible to use a passive recovery device for refrigerant recovery?","options":["A centrifugal air conditioner.","A reciprocating liquid chiller.","A large commercial walk-in freezer with a single compressor.","A domestic refrigerator."],"answer":"A domestic refrigerator.","why":"Passive recovery is permitted on small appliances such as a domestic refrigerator.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-032","type":"I","topic":"access-valves-piercing","q":"When using any equipment or servicing any system that has schrader valves, it is critical to","options":["inspect the schrader valve core for bends and breakage.","replace any damaged schrader valve core to prevent leakage.","cap the schrader ports to prevent accidental depression of the valve core.","All of the above."],"answer":"All of the above.","why":"Inspecting, replacing, and capping Schrader cores all prevent leaks.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-033","type":"I","topic":"safety","q":"If R-12 or R-22 are exposed to high temperatures from open flames, glowing hot metal surfaces etc, these refrigerants can decompose to form","options":["hydrochloric and hydrofluoric acids.","sulfuric and phosphoric acids.","boric and chromic acids.","None of the above."],"answer":"hydrochloric and hydrofluoric acids.","why":"Thermal decomposition of R-12/R-22 produces hydrochloric and hydrofluoric acids.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-034","type":"I","topic":"recovery-levels","q":"When using a graduated charging cylinder, any refrigerant that is vented from the charging cylinder","options":["does not need to be recovered.","must be recovered.","is considered a de minimis release.","None of the above."],"answer":"must be recovered.","why":"Intentional venting is prohibited; that refrigerant must be recovered.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-035","type":"I","topic":"passive-vs-active-recovery","q":"A standard vacuum pump designed specifically for evacuation and dehydration can","options":["be used alone as a self-contained (active) recovery device.","never be used as a recovery device in combination with a pressurized container.","be used alone as a substitute for any recovery device.","be used alone as a system-dependent (passive) recovery device."],"answer":"never be used as a recovery device in combination with a pressurized container.","why":"A vacuum pump alone is not a recovery device and cannot pump into a pressurized container.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-036","type":"I","topic":"regulations-recordkeeping","q":"The EPA section 608 certification must be renewed every","options":["2 years.","3 years.","10 years.","The EPA certification has no expiration date."],"answer":"The EPA certification has no expiration date.","why":"Section 608 certification does not expire.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-037","type":"I","topic":"disposal","q":"Prior to shipping any used refrigerant it is necessary to","options":["properly label the refrigerant container.","properly complete shipping paperwork.","check that the refrigerant container meets Department of Transportation standards.","All of the above."],"answer":"All of the above.","why":"Shipping requires labeling, paperwork, and DOT-compliant containers.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-038","type":"I","topic":"refrigerant-id-substitution","q":"A refrigerant that can be used as a direct service \"drop-in\" substitute for R-12 in a small appliance is","options":["R-410a","R-134a","R-141b","None of the above"],"answer":"None of the above","why":"No true drop-in exists; substitution requires proper retrofit, not a drop-in.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-039","type":"I","topic":"access-valves-piercing","q":"After installing and opening a piercing access valve, if the system is ________ do not begin the recovery procedure.","options":["0 psig","15 psig","30 psig","40 psig"],"answer":"0 psig","why":"0 psig means the system already leaked empty; no refrigerant to recover and indicates a leak.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-040","type":"I","topic":"definitions-scope","q":"The EPA definition of a small appliance includes which of the following?","options":["A device manufactured, charged, and hermetically sealed from the factory.","A device with a charge of 5 pounds or less.","Products with compressors under one quarter horsepower.","Both A and B."],"answer":"Both A and B.","why":"Small appliances are factory-sealed and charged with 5 lb or less.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-041","type":"I","topic":"recovery-technique-compressor","q":"When using ________________ , it is essential to take extra measures such as heating or striking the compressor, to help release trapped refrigerant from the compressor oil.","options":["an active self-contained recovery device","a passive system-dependent recovery devices on an operating system","a passive system-dependent recovery device on a small appliance with a non-operating compressor","a refrigerant system has a low side leak"],"answer":"a passive system-dependent recovery device on a small appliance with a non-operating compressor","why":"With a dead compressor and passive recovery, heat/strike drives refrigerant from oil.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-042","type":"I","topic":"recovery-equipment-requirements","q":"It is an EPA regulation that any person who opens an appliance for maintenance, service, or repair, must have at least one self-contained recovery machine available at their place of business. The only exception to this rule are persons working on","options":["small appliances.","low-pressure appliances.","high-pressure appliances.","R-410a systems."],"answer":"small appliances.","why":"Small appliance technicians may use passive devices and are exempt from the self-contained machine rule.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-043","type":"I","topic":"safety","q":"Which of the following are part of the EPA's recommended safe work practices?","options":["Wear safety glasses or goggles when working with any compressed gas.","Wear a respirator when working with any refrigerant.","Wear butyl-lined gloves when connecting/disconnecting hoses.","Both A and C."],"answer":"Both A and C.","why":"Safety glasses and butyl-lined gloves are recommended; a respirator is not required for routine work.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-044","type":"I","topic":"recovery-levels","q":"Recovery devices that were manufactured before November 15 1993 and are used for recovery of refrigerant from small appliances must be capable of","options":["recovering 80% of the refrigerant whether or not the compressor is operating or achieving a 4-inch vacuum under conditions of ARI 740-1993.","recovering 70% of the refrigerant if the compressor is operating or achieving a 4-inch vacuum under conditions of ARI 740-1993.","achieving a 10-inch vacuum under conditions of ARI 740-1993.","recovering all of the refrigerant if they are still to be used."],"answer":"recovering 80% of the refrigerant whether or not the compressor is operating or achieving a 4-inch vacuum under conditions of ARI 740-1993.","why":"Pre-1993 small-appliance recovery standard is 80% or a 4-inch vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-045","type":"I","topic":"access-valves-piercing","q":"Piercing-type valves should only be used on which of the following type tubing materials?","options":["Copper","Aluminum","Steel","Both A and B"],"answer":"Both A and B","why":"Piercing valves are used on soft copper and aluminum tubing, not hard steel.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-046","type":"I","topic":"passive-vs-active-recovery","q":"When using a passive system-dependent recovery process, you should access both the high side and low side of the system for the refrigerant recovery if","options":["there is a leak in the system.","the systems compressor operates normally.","the systems compressor only operates at half speed.","the systems compressor does not run."],"answer":"the systems compressor does not run.","why":"With a non-running compressor, accessing both sides is needed to reach required efficiency.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-047","type":"I","topic":"recovery-technique-compressor","q":"On a small appliance with an operating compressor that has a completely plugged capillary tube, what is the minimum number of access valves that are needed to evacuate the refrigerant?","options":["Only one access valve on the low side of the system.","Only one access valve on the high side of the system.","Two valves, one on the high and one on the low side of the system because the capillary tube is plugged.","All of the above."],"answer":"Two valves, one on the high and one on the low side of the system because the capillary tube is plugged.","why":"A plugged cap tube blocks flow between sides, so both sides need access valves.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-048","type":"I","topic":"definitions-scope","q":"Technicians with a Type I small appliance certification are certified to recover refrigerant during the maintenance, service, or repair of","options":["small unitary air-conditioning systems with 7 pounds or less of refrigerant.","packaged terminal air-conditioners (PTACs) with pounds or less of refrigerant.","low-pressure equipment.","motor-vehicle air-conditioning equipment."],"answer":"packaged terminal air-conditioners (PTACs) with pounds or less of refrigerant.","why":"PTACs qualify as small appliances under Type I certification.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-049","type":"I","topic":"recovery-levels","q":"A recovery cylinder which is half full of recovered R-500 at normal room temperature, about 75F, in the absence of non-condensables, will be pressurized to","options":["30 psig","75 psig","95 psig","120 psig"],"answer":"95 psig","why":"R-500 saturation pressure at 75F is about 95 psig per the P-T chart.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-050","type":"I","topic":"refrigerant-id-substitution","q":"A refrigerant that can be used as a direct service \"drop-in\" substitute for R-22 in a small appliance is","options":["R-410a","R-134a","R-141b","None of the above"],"answer":"None of the above","why":"No true drop-in for R-22 exists; substitution requires retrofit.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-2/"},{"id":"I-051","type":"I","topic":"recovery-technique-compressor","q":"If you are recovering refrigerant from a frost-free refrigerator, you should","options":["cool the compressor to force liquid out of the high side.","heat the recovery cylinder to vaporize liquid refrigerant.","turn on the defrost heater to vaporize any trapped liquid.","pack ice around the evaporator to ensure maximum liquid is available."],"answer":"turn on the defrost heater to vaporize any trapped liquid.","why":"The defrost heater warms the evaporator, vaporizing trapped liquid for recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-052","type":"I","topic":"recovery-levels","q":"When checking for nondensable gases inside a recovery cylinder, why allow temperature stabilization before taking pressure readings?","options":["To prevent safety valves from purging excess refrigerant.","Because it is a quick method of determining refrigerant level inside the tank.","Because a temperature reading alone is enough to determine refrigerant quality.","Because comparisons to a pressure-temperature chart require stable pressure and temperature."],"answer":"Because comparisons to a pressure-temperature chart require stable pressure and temperature.","why":"P-T chart comparison for non-condensables needs stabilized temperature and pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-053","type":"I","topic":"safety","q":"Whenever nitrogen is used to pressurize or blow debris out of a system, the nitrogen","options":["must be recovered.","can be vented.","should never be used.","can only be used if mixed with R-22."],"answer":"can be vented.","why":"Nitrogen is not a regulated refrigerant and may be vented.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-054","type":"I","topic":"disposal","q":"If a reclamation processing plant receives a recovery tank with mixed refrigerants, they can","options":["refuse to process the refrigerant and return it.","agree to destroy the refrigerant, but typically a substantial fee is charged.","resell the refrigerant for reuse in its current state.","Both A and B"],"answer":"Both A and B","why":"Mixed refrigerant cannot be reclaimed; the plant may refuse it or destroy it for a fee.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-055","type":"I","topic":"recovery-equipment-requirements","q":"Low-loss fittings are used to","options":["connect the recovery device to an appliance and are manually or automatically closed to prevent refrigerant loss when connecting/disconnecting hoses.","connect the recovery device to an appliance so that only a small loss occurs.","connect the recovery device to an appliance and have to be discarded after use.","None of the above."],"answer":"connect the recovery device to an appliance and are manually or automatically closed to prevent refrigerant loss when connecting/disconnecting hoses.","why":"Low-loss fittings seal (manually/automatically) to prevent release during connect/disconnect.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-056","type":"I","topic":"recovery-levels","q":"Recovery or recycling equipment manufactured after November 1, 1993, for small appliances must recover","options":["95 percent of the refrigerant whether or not the compressor is functional.","80 percent if the compressor is inoperable.","90 percent if the compressor is operational.","Both B and C."],"answer":"Both B and C.","why":"Post-1993 standard: 90% with operating compressor, 80% with inoperable compressor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-057","type":"I","topic":"sales-restrictions","q":"The sale of refrigerants is","options":["banned.","limited by law to equipment owners.","allowed only if there is proof of need.","restricted to technicians who are EPA certified in refrigerant recovery."],"answer":"restricted to technicians who are EPA certified in refrigerant recovery.","why":"Refrigerant sales are restricted to EPA-certified technicians.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-058","type":"I","topic":"recovery-levels","q":"A recovery cylinder half full of recovered R-410a at 90F, absent noncondensables, will be pressurized to","options":["100 psig","200 psig","300 psig","400 psig"],"answer":"300 psig","why":"R-410a saturation pressure at 90F is about 300 psig per the P-T chart.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-059","type":"I","topic":"refrigerant-id-substitution","q":"Which refrigerants can be mixed?","options":["R-12 and R-134a","R-12 and R-500","R-22 and R-410a","Refrigerants can never be mixed."],"answer":"Refrigerants can never be mixed.","why":"Different refrigerants must never be mixed during recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-060","type":"I","topic":"disposal","q":"When transporting refrigerants, DOT Regulation 49 CFR requires _____ to be recorded on shipping papers for hazard class 2.2","options":["Volume of each cylinder.","Total cubic feet of each refrigerant.","Number of cylinders of each gas.","Total weight of all cylinders."],"answer":"Number of cylinders of each gas.","why":"DOT 49 CFR class 2.2 shipping papers require the number of cylinders of each gas.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-061","type":"I","topic":"safety","q":"If a large refrigerant leak occurs in an enclosed area with no self-contained breathing apparatus, the technician should","options":["put on a dust mask and butyl-lined gloves and try to stop the leak.","put on a dust mask and use a leak detector to locate and stop it.","vacate and ventilate the area.","All of the above"],"answer":"vacate and ventilate the area.","why":"Without SCBA, the safe response to a large release is to leave and ventilate.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-062","type":"I","topic":"recovery-technique-compressor","q":"When recovering refrigerant from a household refrigerator where the compressor does not run, installing low side and high side access valves is recommended because","options":["it can enhance the speed of recovery.","it may be necessary to achieve required recovery efficiency.","otherwise the compressor may be damaged.","Both A and B"],"answer":"Both A and B","why":"Dual access speeds recovery and helps reach the required efficiency with a dead compressor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-063","type":"I","topic":"recovery-levels","q":"A recovery cylinder half full of R-12 at 75F, absent non-condensibles, will be pressurized to","options":["30 psig","75 psig","150 psig","200 psig"],"answer":"75 psig","why":"R-12 saturation pressure at 75F is about 75 psig per the P-T chart.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-064","type":"I","topic":"safety","q":"When using nitrogen, the nitrogen tank should always be equipped with a","options":["regulator.","level sensor.","yellow top.","hand valve."],"answer":"regulator.","why":"High-pressure nitrogen requires a regulator to control pressure safely.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-065","type":"I","topic":"recovery-technique-compressor","q":"To avoid accidental removal of liquid refrigerant when recovering vapor using a self-contained device that cannot handle liquid, draw vapor from the","options":["capillary tube.","low side.","high side.","All of the above."],"answer":"high side.","why":"Drawing from the high side avoids pulling liquid into a vapor-only recovery device.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"I-066","type":"I","topic":"access-valves-piercing","q":"If you install an access fitting on a sealed system","options":["the fitting should be leak tested before proceeding with recovery.","it is not necessary to leak test the access fitting.","the fitting does not need testing until the total repair is completed.","the system must be pressurized with dry nitrogen before leak testing."],"answer":"the fitting should be leak tested before proceeding with recovery.","why":"A newly installed access fitting must be leak-tested before recovery begins.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-1/small-appliance-practice-test-3/"},{"id":"II-001","type":"II","topic":"leak-detection-methods","q":"Heat pumps that use R-410A should be leak checked with","options":["HFCs","HCFCs to lower the cost of discarding the refrigerant","Pressurized nitrogen","Compressed oxygen"],"answer":"Pressurized nitrogen","why":"Nitrogen is the safe pressurizing gas for leak checks; never use the refrigerant, oxygen, or air.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-002","type":"II","topic":"leak-detection-methods","q":"Heat pumps retrofitted from R-22 to R-407C should be leak checked with","options":["HFCs","HCFCs","Pressurized nitrogen","Compressed air"],"answer":"Pressurized nitrogen","why":"Dry nitrogen is the proper pressurizing medium for leak checking, not air or refrigerants.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-003","type":"II","topic":"recovery-requirements-vacuum","q":"To change the compressor on a system containing R-410A, you must isolate the compressor and then","options":["Simply remove the compressor","Evacuate the isolated section of the system to atmospheric pressure and hold","Evacuate to 10 inches of vacuum and hold","Evacuate to 15 inches of vacuum and hold"],"answer":"Evacuate the isolated section of the system to atmospheric pressure and hold","why":"High-pressure (R-410A) systems are evacuated only to atmospheric pressure before major repair.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-004","type":"II","topic":"charging","q":"The method to charge a system with 80 pounds normal charge is to charge with","options":["Vapor through the suction line service valve","Liquid through the discharge service valve","Liquid through the suction service valve","Liquid through the liquid line service valve"],"answer":"Liquid through the liquid line service valve","why":"Large charges are added as liquid through the liquid line to charge quickly and accurately.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-005","type":"II","topic":"leak-detection-methods","q":"After installation of a field-piped R-410A split heat pump, the unit should first be","options":["Evacuated","Pressurized with R-22, then leak checked","Pressurized with R-410A, then leak checked","Pressurized with nitrogen, then leak checked"],"answer":"Pressurized with nitrogen, then leak checked","why":"After field piping, pressurize with dry nitrogen and leak check before evacuation/charging.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-006","type":"II","topic":"safety-cylinders","q":"Pressure relief valves must not be","options":["Installed in series","Installed in parallel","Installed vertically","Installed horizontally"],"answer":"Installed in series","why":"Relief valves in series can block each other; they must never be installed in series.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-007","type":"II","topic":"charging","q":"When charging an R-12 system with water-cooled condenser, charge with vapor to at least ___ before switching to liquid charging","options":["0 psig","20 psig","35 psig","100 psig"],"answer":"35 psig","why":"Add vapor first to raise pressure above freezing point before liquid charging to avoid freeze-up.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-008","type":"II","topic":"recovery-equipment-certification","q":"Recovery/recycling machine has R-22; must recover R-410A. What must be done first?","options":["Machine must be EPA-certified for R-410A use","Recovery tank must be designed for R-410A pressure","Filter and lubricant must be changed and machine evacuated","All of the above"],"answer":"All of the above","why":"Switching refrigerants requires certified high-pressure equipment, rated tank, and cross-contamination removal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-009","type":"II","topic":"recovery-technique-sequence","q":"After reaching required recovery vacuum, you must","options":["Immediately disconnect equipment and open system","Immediately break vacuum with nitrogen","Immediately pressurize with nitrogen and leak check","Wait to see if the system pressure rises indicating that there is still refrigerant"],"answer":"Wait to see if the system pressure rises indicating that there is still refrigerant","why":"A pressure rise after recovery shows trapped refrigerant boiling off; wait and re-recover.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-010","type":"II","topic":"cycle-components-mechanics","q":"In a refrigeration system, the component directly following the evaporator is the","options":["Receiver","Metering device","Accumulator","Condenser"],"answer":"Accumulator","why":"The accumulator follows the evaporator to trap liquid and protect the compressor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-011","type":"II","topic":"safety-cylinders","q":"A reciprocating compressor should not be energized while","options":["The discharge service valve is closed","The suction service valve is open","The discharge service valve is open","There is a demand for cooling"],"answer":"The discharge service valve is closed","why":"Running against a closed discharge valve causes dangerous pressure buildup.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-012","type":"II","topic":"safety-cylinders","q":"R-410A requires high-pressure manifold gauge and hose set with","options":["2000 psig burst, 400 psig working pressure","2000 psig burst, 800 psig working pressure","4000 psig burst, 400 psig working pressure","4000 psig burst, 800 psig working pressure"],"answer":"4000 psig burst, 800 psig working pressure","why":"R-410A's high pressures require gauges rated 800 psig working / 4000 psig burst.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-013","type":"II","topic":"cycle-components-mechanics","q":"Refrigerant pressure inside R-410A unit at room temperature (72F), not operating, is approximately","options":["74 psig","110 psig","210 psig","310 psig"],"answer":"210 psig","why":"R-410A's saturation pressure at 72F is roughly 210 psig, much higher than R-22/R-12.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-014","type":"II","topic":"safety-cylinders","q":"Every air conditioning or refrigeration system should be protected by a","options":["Pressure relief device","Properly located stop valve","Low-pressure control","Refrigerant receiver"],"answer":"Pressure relief device","why":"A pressure relief device protects against dangerous overpressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-015","type":"II","topic":"recovery-requirements-vacuum","q":"To change compressor on system with 40 pounds R-500 using recycling machine manufactured AFTER November 15, 1993","options":["Simply remove the compressor","Evacuate to atmospheric pressure, then remove","Evacuate to 10 inches of vacuum and hold. If system pressure does not rise, remove","Evacuate to 15 inches of vacuum and hold"],"answer":"Evacuate to 10 inches of vacuum and hold. If system pressure does not rise, remove","why":"Post-1993 equipment, <200 lb high-pressure charge: evacuate to 10 in Hg vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-016","type":"II","topic":"diagnosis-by-symptom","q":"When inspecting a system for leaks, look for","options":["Frost on the pipes","Puddles of liquid refrigerant","Particles from the drier core","Traces of oil"],"answer":"Traces of oil","why":"Oil traces escape with refrigerant at a leak, marking the leak location.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-017","type":"II","topic":"leak-detection-methods","q":"When a new system has been assembled, the first thing to do is","options":["Evacuate the system","Pressurize with inert gas and leak check","Pressurize with refrigerant to be used","Introduce initial charge and start compressor"],"answer":"Pressurize with inert gas and leak check","why":"Leak check first with inert gas before evacuating and charging.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-018","type":"II","topic":"refrigerant-substitution-retrofit","q":"R-410A is different from other ASHRAE 400 series blends because","options":["R-410A behaves as a near azeotropic refrigerant and can be topped off","R-410A is an HCFC","R-410A uses mineral oil","All of the above"],"answer":"R-410A behaves as a near azeotropic refrigerant and can be topped off","why":"R-410A is near-azeotropic, so it has minimal glide and can be topped off.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-019","type":"II","topic":"recovery-requirements-vacuum","q":"Manifold gauge set hoses should have self-sealing connectors or hand valves to","options":["Minimize chance of explosion during use","Prevent venting during recycling","Prevent vapor lock during rapid liquid transfer","Minimize the release of refrigerant when the hoses are connected and disconnected"],"answer":"Minimize the release of refrigerant when the hoses are connected and disconnected","why":"Low-loss fittings minimize refrigerant release during connect/disconnect.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-020","type":"II","topic":"recovery-requirements-vacuum","q":"Using recovery/recycling equipment manufactured AFTER November 15, 1993, evacuate system with MORE than 200 pounds CFC-12 to ___ before major repair","options":["0 psig","4 inches of Hg vacuum","10 inches of Hg vacuum","15 inches of Hg vacuum"],"answer":"15 inches of Hg vacuum","why":"Post-1993 equipment, >200 lb low-pressure (CFC-12) charge: evacuate to 15 in Hg.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-021","type":"II","topic":"recovery-technique-sequence","q":"With air-cooled condenser on roof and evaporator on first floor, recovery should first occur","options":["From vapor line entering condenser","From discharge side of compressor","From liquid line entering evaporator","On suction side of compressor"],"answer":"From liquid line entering evaporator","why":"Recover liquid from the lowest point first to speed recovery of the bulk charge.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-022","type":"II","topic":"safety-cylinders","q":"Never use oxygen or compressed air to leak check because R-410A can","options":["Explode when mixed with air or oxygen","Fractionate when mixed with oxygen","Condense when exposed to oxygen","None of the above"],"answer":"Explode when mixed with air or oxygen","why":"Pressurized refrigerant-air/oxygen mixtures can be combustible/explosive.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-023","type":"II","topic":"evacuation-dehydration","q":"Dry nitrogen should be used to break first vacuum when dehydrating by double evacuation method. However, it","options":["Often contains moisture","Is expensive","Is toxic","Can be dangerous if not used with a pressure regulator"],"answer":"Can be dangerous if not used with a pressure regulator","why":"High-pressure nitrogen cylinders require a regulator to avoid overpressurizing the system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-024","type":"II","topic":"recovery-equipment-certification","q":"A recovery machine using hermetic compressor will overheat when drawing deep vacuum because","options":["It runs faster than other equipment","The motor needs the flow of refrigerant through the compressor to provide motor cooling","Oils used in hermetic compressors burn at lower temperatures","It has higher compression ratio limit"],"answer":"The motor needs the flow of refrigerant through the compressor to provide motor cooling","why":"Hermetic motors rely on refrigerant flow for cooling, which is lost under deep vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-025","type":"II","topic":"charging","q":"Proper charging method for blended (non-azeotropic) refrigerants (400 series) is to remove charge from cylinder as a","options":["Vapor","Liquid","Superheated vapor","Subcooled liquid"],"answer":"Liquid","why":"Zeotropic blends must be removed as liquid to preserve correct composition.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-1/"},{"id":"II-026","type":"II","topic":"leak-detection-methods","q":"When a refrigerant trace gas becomes absolutely necessary to use, which of the available refrigerants should be used to identify a leak?","options":["CFC-12","HCFC-22","HFC-407c","HFC-410a"],"answer":"HCFC-22","why":"When a trace refrigerant is unavoidable, HCFC-22 is used as the trace gas.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-027","type":"II","topic":"recovery-technique-sequence","q":"After refrigerant liquid has been recovered from a system, any remaining vapor is","options":["purged to the atmosphere","isolated in the system","pumped into the system receiver","condensed by the recovery system"],"answer":"condensed by the recovery system","why":"Remaining vapor is condensed by the recovery machine, never vented.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-028","type":"II","topic":"diagnosis-by-symptom","q":"An oil sample should be taken when","options":["a new filter dryer has been installed","the compressor has burned out","the unit is not cooling properly","recycled refrigerant has been added to the unit"],"answer":"the compressor has burned out","why":"An oil sample after a burnout checks acid level to plan cleanup.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-029","type":"II","topic":"cycle-components-mechanics","q":"In a refrigeration system with a TXV or other type of throttling device, the component directly following the condenser would be the","options":["receiver","metering device","accumulator","evaporator"],"answer":"receiver","why":"The receiver follows the condenser to store liquid refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-030","type":"II","topic":"recovery-technique-sequence","q":"Recovered refrigerant may contain which of the following?","options":["Acids","Moisture","Oils","All of the above"],"answer":"All of the above","why":"Recovered refrigerant can contain acids, moisture, and oil \u2014 hence recycle/reclaim.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-031","type":"II","topic":"cycle-components-mechanics","q":"The backseating of a suction shut-off valve will close the","options":["suction line and compressor port","compressor and gauge port","gauge port","compressor port"],"answer":"gauge port","why":"Backseating a service valve closes the gauge port to the manifold.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-032","type":"II","topic":"leak-rates-repair-timelines","q":"Which repair would always be considered 'major' under the EPA's regulations?","options":["Replacement of an evaporator coil","Replacement of a filter dryer","Replacement of a schrader valve core","Replacement of a condenser fan motor"],"answer":"Replacement of an evaporator coil","why":"Replacing an evaporator coil is a defined major repair requiring evacuation.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-033","type":"II","topic":"recovery-equipment-certification","q":"R-410a requires certified recovery and recycling equipment rated for at least","options":["240 psig","300 psig","400 psig","500 psig"],"answer":"400 psig","why":"R-410A's high pressures require recovery equipment rated at least 400 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-034","type":"II","topic":"cycle-components-mechanics","q":"A compressor heater is used to","options":["prevent refrigerant vaporization","remove entrained water","prevent acid pitting","reduce the amount of refrigerant in the lubricating oil"],"answer":"reduce the amount of refrigerant in the lubricating oil","why":"The crankcase heater drives refrigerant out of the oil to prevent migration/dilution.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-035","type":"II","topic":"recovery-equipment-certification","q":"Your recovery/recycling machine has R-502 refrigerant in it. You now have to recover refrigerant from a unit with R-22. What must be done before the R-22 refrigerant can be recovered/recycled?","options":["Nothing as long as the recovery machine is not full","Change the expansion valve on the recovery machine","Change the filter and expansion valve on the recovery machine","Recover as much of the R-502 as possible from the recovery machine, change the filter, and evacuate"],"answer":"Recover as much of the R-502 as possible from the recovery machine, change the filter, and evacuate","why":"Prevent cross-contamination by clearing prior refrigerant, changing filter, and evacuating.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-036","type":"II","topic":"recovery-technique-sequence","q":"The fastest way to recover refrigerant from a system is to remove it in the _______ phase.","options":["final","initial","liquid","vapor"],"answer":"liquid","why":"Liquid recovery moves the most refrigerant fastest.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-037","type":"II","topic":"recovery-technique-sequence","q":"Before using a recovery unit to remove a charge, what steps should be taken?","options":["Check service valve positions","Check the oil level in the recovery unit","Evacuate recovery unit and recovery tank","All of the above"],"answer":"All of the above","why":"Verify valves, oil level, and evacuate unit/tank before recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-038","type":"II","topic":"recovery-requirements-vacuum","q":"A deep vacuum is usually measured in","options":["psig","psia","inches of Hg","microns"],"answer":"microns","why":"Deep vacuum levels are measured in microns.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-039","type":"II","topic":"recovery-technique-sequence","q":"Before transferring refrigerant to an empty cylinder","options":["the refrigerant should be chilled","the refrigerant should be mixed","the cylinder should be heated","the cylinder should be evacuated to avoid mixing air with the recovered refrigerant"],"answer":"the cylinder should be evacuated to avoid mixing air with the recovered refrigerant","why":"Evacuate the cylinder first to keep noncondensables out of recovered refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-040","type":"II","topic":"recovery-technique-sequence","q":"To recover liquid refrigerant, you must connect one hose to the","options":["compressor suction valve","compressor discharge valve","liquid line","top of the condenser"],"answer":"liquid line","why":"Liquid recovery connects to the liquid line where refrigerant is liquid.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-041","type":"II","topic":"recovery-requirements-vacuum","q":"A system can be evacuated to only atmospheric pressure when","options":["the repair is major","the repair is followed by an evacuation of the appliance to the environment","leaks in the appliance make evacuation to the prescribed level unattainable","the appliance is being disposed"],"answer":"leaks in the appliance make evacuation to the prescribed level unattainable","why":"If leaks prevent reaching required vacuum, evacuation to atmospheric is allowed.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-042","type":"II","topic":"evacuation-dehydration","q":"The vacuum pump used to evacuate a system should be capable of pulling a vacuum of","options":["10mm Hg","20mm Hg","500 microns","1000 microns"],"answer":"500 microns","why":"A proper vacuum pump should reach about 500 microns to dehydrate the system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-043","type":"II","topic":"safety-cylinders","q":"While R-410a is a high-pressure refrigerant, it can be stored in the back of your service van as long as","options":["the temperature inside the vehicle does not exceed 125F. This is the same guidance given for R-22 and other common refrigerants","the temperature inside the vehicle does not exceed 125F. But R-22 can be stored in vehicles with temperatures exceeding 125F","the temperature inside the vehicle does not exceed 155F. This is the same guidance given for R-22 and other common refrigerants","the temperature inside the vehicle does not exceed 155F. But R-22 can be stored in vehicles with temperatures exceeding 155F"],"answer":"the temperature inside the vehicle does not exceed 125F. This is the same guidance given for R-22 and other common refrigerants","why":"Refrigerant cylinders must not exceed 125F to avoid dangerous pressure rise.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-044","type":"II","topic":"recovery-equipment-certification","q":"When under a deep vacuum, the motor winding of a hermetic refrigeration compressor","options":["will be damaged if energized","must be kept warm to operate properly","will be protected by its insulation","will overheat only if the crankcase heater is energized"],"answer":"will be damaged if energized","why":"Energizing a hermetic motor under deep vacuum can arc and destroy the windings.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-045","type":"II","topic":"recovery-equipment-certification","q":"Which statement is NOT true regarding recycling and recovery equipment manufactured after November 15 1993?","options":["It must be tested by an EPA approved third party","It must meet vacuum standards more stringent than those met by equipment manufactured before 15 November 1993","It must be equipped with low-loss fittings","It must have an oil separator"],"answer":"It must have an oil separator","why":"An oil separator is not a required feature of post-1993 recovery equipment.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-046","type":"II","topic":"cycle-components-mechanics","q":"When a unit is opened for servicing, the _______ should always be replaced.","options":["thermostat","metering device","crankcase heater","filter-drier"],"answer":"filter-drier","why":"Always replace the filter-drier whenever the system is opened.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-047","type":"II","topic":"recovery-technique-sequence","q":"When servicing an operating unit that has a receiver/storage tank, the","options":["compressor should be isolated off","liquid should be recovered last","refrigerant should be recovered into the receiver","gauge pressure should be achieved by venting"],"answer":"refrigerant should be recovered into the receiver","why":"Pump the charge down into the system's own receiver for storage during service.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-048","type":"II","topic":"diagnosis-by-symptom","q":"Use _______ to remove ice from a sight glass.","options":["an alcohol spray","water","R-11 refrigerant","a screw driver or flat file"],"answer":"an alcohol spray","why":"Alcohol spray safely melts/removes ice from a sight glass.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-049","type":"II","topic":"cycle-components-mechanics","q":"The refrigerant pressure inside an R-12 unit which is at room temperature (72F) and not operating is","options":["approximately 74 psig","approximately 154 psig","approximately 214 psig","approximately 304 psig"],"answer":"approximately 74 psig","why":"R-12's saturation pressure at 72F is about 74 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-050","type":"II","topic":"refrigerant-substitution-retrofit","q":"You are going to service a newer residential split-system air-conditioner. You would expect to find the system charged with which refrigerant?","options":["R-11","R-12","R-410a","R-502"],"answer":"R-410a","why":"Newer residential split systems are charged with R-410A.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-2/"},{"id":"II-051","type":"II","topic":"recovery-equipment-certification","q":"A routine maintenance task which must be performed on refrigerant recycling machines is to","options":["check compressor seals","change electrical fuses","replace moisture sight glass","change filter and compressor oil if any"],"answer":"change filter and compressor oil if any","why":"Routine recovery-machine maintenance is changing the filter and oil.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-052","type":"II","topic":"recovery-technique-sequence","q":"Refrigerant should be removed from the condenser outlet if the","options":["condenser is on the roof","compressor is inoperative","evaporator has a leak","condenser is below the receiver"],"answer":"condenser is below the receiver","why":"Remove liquid from the lowest liquid point to recover the bulk charge fastest.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-053","type":"II","topic":"evacuation-dehydration","q":"When evacuating a system, the use of a large vacuum pump could","options":["cause trapped oil to freeze","cause trapped refrigerant to freeze","cause trapped water to freeze","causes the valves to freeze"],"answer":"cause trapped water to freeze","why":"Rapid evacuation can freeze trapped moisture, slowing dehydration.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-054","type":"II","topic":"diagnosis-by-symptom","q":"On refrigeration units that use an open compressor, the _______ is most likely to leak if the unit is not used for several months","options":["suction service valve","rotating shaft seal","oil drain plug","discharge service valve"],"answer":"rotating shaft seal","why":"Open-drive shaft seals dry out and leak during long idle periods.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-055","type":"II","topic":"recovery-equipment-certification","q":"The primary water source most often used for cooling the condenser of a water-cooled recovery unit is","options":["de-ionized water","chilled water","condenser water","local municipal water supply"],"answer":"local municipal water supply","why":"Municipal tap water is the common cooling source for water-cooled recovery units.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-056","type":"II","topic":"recovery-requirements-vacuum","q":"When using recovery and recycling equipment manufactured BEFORE November 15 1993, technicians must evacuate a unit that has a normal charge of 10 pounds of CFC-500 to _______ before disposing of the system","options":["0 psig","4 inches of Hg vacuum","10 inches of Hg vacuum","15 inches of Hg vacuum"],"answer":"4 inches of Hg vacuum","why":"Pre-1993 equipment, <200 lb high-pressure charge: evacuate to 4 in Hg.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-057","type":"II","topic":"cycle-components-mechanics","q":"The evaporation temperature of R-410a at 100 psig is about","options":["0 F","30 F","90 F","120 F"],"answer":"30 F","why":"R-410A saturates near 30F at about 100 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-058","type":"II","topic":"diagnosis-by-symptom","q":"Noncondensables in a system cause a","options":["lower suction pressure","higher suction pressure","lower discharge pressure","higher discharge pressure"],"answer":"higher discharge pressure","why":"Noncondensables (air) raise head/discharge pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-059","type":"II","topic":"charging","q":"When charging an R-410a system that uses a water-cooled condenser, you must first charge with vapor to a pressure of at least _______ before switching to liquid charging","options":["20 psig","120 psig","220 psig","320 psig"],"answer":"120 psig","why":"Add vapor to raise pressure above freezing before liquid charging an R-410A system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-060","type":"II","topic":"recovery-equipment-certification","q":"R-410a requires recovery tanks rated for at least","options":["240 psig","300 psig","400 psig","500 psig"],"answer":"400 psig","why":"R-410A recovery tanks must be rated at least 400 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-061","type":"II","topic":"recovery-technique-sequence","q":"The recovery rate can be increased by","options":["packing the recovery vessel in ice","heating the recovery vessel","using a smaller recovery vessel","using a standard vacuum pump"],"answer":"packing the recovery vessel in ice","why":"Cooling the recovery cylinder lowers its pressure, speeding recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-062","type":"II","topic":"diagnosis-by-symptom","q":"Oil foaming usually occurs in the","options":["condenser","evaporator","compressor","expansion device"],"answer":"compressor","why":"Refrigerant boiling out of oil at startup causes foaming in the compressor crankcase.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-063","type":"II","topic":"evacuation-dehydration","q":"During the evacuation of a system that contains large amounts of moisture, it may be necessary to increase pressure in the system with _______ to counteract freezing of the moisture","options":["hydrogen","oxygen","air","nitrogen"],"answer":"nitrogen","why":"Breaking vacuum with dry nitrogen prevents moisture from freezing during dehydration.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-064","type":"II","topic":"recovery-technique-sequence","q":"Prior to replacing the condenser coil in a high pressure system, the refrigerant was recovered and stored in a refillable cylinder. The refrigerant","options":["can probably be charged back into the system","should probably be replaced with R-410a","must be reclaimed","must be destroyed"],"answer":"can probably be charged back into the system","why":"Refrigerant recovered on-site for the same system can be returned to it.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-065","type":"II","topic":"cycle-components-mechanics","q":"The evaporation temperature of R-134a at 0 psig is","options":["-21 F","-15 F","-5 F","-1 F"],"answer":"-15 F","why":"R-134a boils near -15F at atmospheric pressure (0 psig).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-066","type":"II","topic":"refrigerant-substitution-retrofit","q":"When servicing a 60-ton packaged rooftop unit, the easiest way to check the type of refrigerant it uses is to","options":["use your service gauge set and a refrigerant card","ask the owner","look at the unit nameplate","determine the condenser size"],"answer":"look at the unit nameplate","why":"The nameplate states the refrigerant type directly.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-067","type":"II","topic":"leak-rates-repair-timelines","q":"EPA regulations require that any appliances containing more than 50 pounds of refrigerant, except for commercial and industrial process refrigeration, must be repaired when the leak-rate exceeds _______ of the charge per year","options":["5 percent","10 percent","25 percent","35 percent"],"answer":"10 percent","why":"Comfort-cooling appliances >50 lb must be repaired when leak rate exceeds 10%/yr.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-068","type":"II","topic":"leak-rates-repair-timelines","q":"EPA regulations require that leaking commercial or industrial process refrigeration equipment must be repaired when the leak-rate exceeds _______ of the charge per year","options":["5%","15%","25%","30%"],"answer":"30%","why":"Industrial process refrigeration must be repaired when leak rate exceeds 30%/yr (per the source key; current EPA guidance commonly cites 35%).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-069","type":"II","topic":"refrigerant-substitution-retrofit","q":"You are going to service an older residential split-system air conditioner. You would expect to find the system charged with which refrigerant?","options":["R-11","R-12","R-22","R-502"],"answer":"R-22","why":"Older residential split systems are charged with R-22.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-070","type":"II","topic":"safety-cylinders","q":"For what refrigerant is an equipment room refrigerant monitor required under ASHRAE Standard 15?","options":["R-12","R-134a","R-11","R-123"],"answer":"R-123","why":"R-123 is toxic, so ASHRAE 15 requires an equipment-room monitor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-071","type":"II","topic":"leak-detection-methods","q":"Heat pumps that use R-134a should be leak-checked with","options":["CFCs","HCFCs","compressed dry air","pressurized nitrogen"],"answer":"pressurized nitrogen","why":"Dry nitrogen is the proper leak-check pressurizing gas.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-072","type":"II","topic":"diagnosis-by-symptom","q":"On a high-pressure system, _______ is an indicator of a possible leak","options":["high head pressure","low water temperature","excessive superheat","frequent purging"],"answer":"excessive superheat","why":"Low charge from a leak raises superheat.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-073","type":"II","topic":"recovery-equipment-certification","q":"System-dependent recovery equipment CANNOT be used when","options":["the appliance is leaking","the compressor of the appliance is operational","the ambient temperature is over 115 F","the appliance contains over 15 pounds of refrigerant"],"answer":"the appliance contains over 15 pounds of refrigerant","why":"System-dependent (passive) recovery is prohibited on appliances over 15 lb charge.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-074","type":"II","topic":"evacuation-dehydration","q":"Moisture is removed from a system by","options":["purging the condenser","draining the oil separator","reducing water flow to the condenser","using a filter drier"],"answer":"using a filter drier","why":"The filter-drier adsorbs residual moisture from the system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-075","type":"II","topic":"cycle-components-mechanics","q":"Which component is not part of the low side of a system?","options":["Evaporator","Receiver","Suction line","Accumulator"],"answer":"Receiver","why":"The receiver is on the high-pressure (liquid) side, not the low side.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"III-001","type":"III","topic":"recovery-procedure-chiller","q":"A typical setting for the high-pressure cut-out control on a recovery unit used for evacuating refrigerant from a low-pressure chiller is","options":["2 psig","5 psig","10 psig","15 psig"],"answer":"10 psig","why":"Recovery units on low-pressure chillers cut out at 10 psig to avoid rupture-disc failure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-002","type":"III","topic":"leak-detection-pressure-limits","q":"A charged low pressure refrigeration system can be efficiently leak-checked by","options":["adding compressed air since it will be removed from the system by the purging unit","operating the purge system","adding HCFC-22","raising system pressure by heating with circulated hot water or heating blankets"],"answer":"raising system pressure by heating with circulated hot water or heating blankets","why":"Heating raises low-side pressure above atmospheric so leaks can be detected without exceeding limits.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-003","type":"III","topic":"low-pressure-fundamentals","q":"The existence of air in a low pressure system causes","options":["low head pressure","low suction pressure","high head pressure","high liquid level"],"answer":"high head pressure","why":"Noncondensable air raises condensing (head) pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-004","type":"III","topic":"safety-oel","q":"Which safety precaution should be adhered to for low pressure systems?","options":["Do not siphon refrigerant by mouth","Avoid spilling liquid refrigerant on your skin","Use gloves and safety goggles when working with liquid refrigerant","All of the above"],"answer":"All of the above","why":"All listed precautions apply when handling liquid refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-005","type":"III","topic":"refrigerant-id-substitution","q":"Refrigerant-11 (R-11) at 14.7 psia, will boil at about","options":["60.3 F","74.5 F","79.7 F","80.2 F"],"answer":"74.5 F","why":"R-11 boils near 74.5F at atmospheric pressure (14.7 psia).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-006","type":"III","topic":"water-side-tube-leaks","q":"When there is excessive moisture collecting in the purge unit of a low pressure refrigeration system, this indicates that","options":["the system with contaminated refrigerant","the condenser or chiller barrel tubes are leaking","the purge unit is not operating properly","the purge unit needs adjustment"],"answer":"the condenser or chiller barrel tubes are leaking","why":"Water in the purge points to leaking water-side tubes.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-007","type":"III","topic":"safety-oel","q":"ASHRAE Standard 15-1994 requires equipment room refrigerant sensors for what safety group classification?","options":["A1","B2","A2","All refrigerant safety groups"],"answer":"All refrigerant safety groups","why":"ASHRAE 15-1994 requires sensors regardless of refrigerant safety group.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-008","type":"III","topic":"charging-procedure","q":"When recharging a refrigeration system with R-11, what vapor pressure is necessary in the shells before charging with liquid?","options":["21.1 inch Hg vacuum","19.7 inch Hg vacuum","18.1 inch Hg vacuum","16.9 inch Hg vacuum"],"answer":"16.9 inch Hg vacuum","why":"Vapor pressure must be raised to ~16.9 in Hg vacuum before liquid charging to prevent freezing.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-009","type":"III","topic":"recovery-vacuum-levels","q":"After reaching the required recovery vacuum on a chiller, you should","options":["Immediately disconnect the recycling or recovery equipment and open the system for service","wait for at least a few minutes to see if the system pressure rises, indicating there is still refrigerant in liquid form or in the oil","Immediately break the vacuum with nitrogen and open the system for service","Immediately pressurize the system with nitrogen and perform a leak check"],"answer":"wait for at least a few minutes to see if the system pressure rises, indicating there is still refrigerant in liquid form or in the oil","why":"A pressure rise after vacuum indicates remaining refrigerant in oil/liquid.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-010","type":"III","topic":"water-side-tube-leaks","q":"A hydrostatic tube test kit is used to","options":["blow all water from the tubes","remove any water from the machine","vent refrigerant","determine if a tube leaks"],"answer":"determine if a tube leaks","why":"Hydrostatic tube test kits locate leaking tubes.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-011","type":"III","topic":"charging-procedure","q":"When charging a chiller, refrigerant vapor is introduced into the system before charging with liquid refrigerant. This is because","options":["charging with vapor increases pressure slowly, preventing failure of the rupture disk","charging with vapor is faster than charging with liquid","liquid charging is more difficult to control than vapor charging","liquid charged into a deep vacuum will cause the refrigerant to boil and may lower temperatures enough to freeze the water in the tubes"],"answer":"liquid charged into a deep vacuum will cause the refrigerant to boil and may lower temperatures enough to freeze the water in the tubes","why":"Vapor charging first raises pressure to prevent flash-freezing of tube water.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-012","type":"III","topic":"recovery-procedure-chiller","q":"When evacuating a system, the use of too large a vacuum pump can cause","options":["trapped water to freeze","trapped oil to freeze","trapped refrigerant to freeze","valves to freeze"],"answer":"trapped water to freeze","why":"Too-fast evacuation drops pressure so quickly that trapped water freezes.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-013","type":"III","topic":"low-pressure-fundamentals","q":"On a low pressure chiller with an open-type compressor, the _______ is/are very susceptible to leaks.","options":["chiller tubes","shaft seal","charging connections","shaft bearings"],"answer":"shaft seal","why":"Open-drive compressors leak at the rotating shaft seal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-014","type":"III","topic":"purge-units","q":"What steps may be taken to prevent air accumulation into an idle low-pressure refrigeration system?","options":["Leave the purge unit on at all times","System pressure should be maintained slightly above atmospheric pressure","Open the air vents on the condenser","Intermittently operate the system with no load"],"answer":"System pressure should be maintained slightly above atmospheric pressure","why":"Positive pressure keeps air from leaking into an idle low-pressure system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-015","type":"III","topic":"regulations-recordkeeping","q":"Commercial and industrial process refrigeration systems must be repaired when the leak rate exceeds _______ percent of the charge per year.","options":["5 percent","15 percent","20 percent","30 percent"],"answer":"30 percent","why":"Industrial process refrigeration trigger rate is 30% (era-specific exam answer).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-016","type":"III","topic":"recovery-procedure-chiller","q":"When recovering vapor from a low pressure refrigeration system,","options":["the water pumps should be on, and the recovery compressor should be off","the system water pumps should be on, the recovery compressor should be on, and the recovery condenser water should be off","the system water pumps, the recovery compressor, and the recovery condenser water should all be on","the system water pumps should be off, and the recovery compressor should be on"],"answer":"the system water pumps, the recovery compressor, and the recovery condenser water should all be on","why":"All water flows and the recovery compressor must run during vapor recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-017","type":"III","topic":"purge-units","q":"Where does refrigerant go after it leaves the purge unit of a low pressure centrifugal system?","options":["The evaporator","The condenser","The compressor intercooler","The recovery service vessel"],"answer":"The evaporator","why":"Purge-recovered refrigerant returns to the evaporator (low side).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-018","type":"III","topic":"purge-units","q":"The purge unit takes its suction from the","options":["top of the condenser","compressor oil sump","top of the evaporator","suction elbow"],"answer":"top of the condenser","why":"Noncondensables collect at the top of the condenser, where the purge draws from.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-019","type":"III","topic":"regulations-recordkeeping","q":"Which of the following repairs would ALWAYS be considered a \"major\" repair under EPA's regulations?","options":["Replacement of an evaporator coil","Replacement of a filter-drier","Replacement of a switch","Replacement of a purge unit"],"answer":"Replacement of an evaporator coil","why":"Evaporator coil replacement is defined as a major repair by EPA.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-020","type":"III","topic":"charging-procedure","q":"Charging liquid refrigerant into a refrigeration system when it is under a 29-inch Hg vacuum can cause the","options":["liquid refrigerant to absorb excess moisture","purge unit to operate","system water to freeze","liquid refrigerant to freeze"],"answer":"system water to freeze","why":"Liquid flashing in deep vacuum freezes the chiller water.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-021","type":"III","topic":"recovery-vacuum-levels","q":"According to the EPA there is approximately _______ of refrigerant vapor left in an average 350 ton R-11 chiller at 0 psig pressure once all the R-11 liquid has been removed.","options":["0 lbs","10 lbs","20 lbs","100 lbs"],"answer":"100 lbs","why":"~100 lbs of vapor remains at 0 psig, requiring further vapor recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-022","type":"III","topic":"recovery-procedure-chiller","q":"An oil sample should be taken when","options":["a new filter drier has been installed","there has been a compressor burnout","the unit is not cooling properly","recycled refrigerant has been added to the unit"],"answer":"there has been a compressor burnout","why":"Burnout contaminates oil, so a sample is taken to assess acid/contamination.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-023","type":"III","topic":"purge-units","q":"Both CFC-11 and HCFC-123 chillers require purge units because","options":["the purge units remove moisture","the system operates below atmospheric pressure","purge units remove refrigerant from the oil sump","purge units remove CFCs from the chiller"],"answer":"the system operates below atmospheric pressure","why":"Sub-atmospheric operation lets air leak in, so purge units are required.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-024","type":"III","topic":"recovery-procedure-chiller","q":"Refrigerant recovery typically starts with _______ because it is faster.","options":["vapor recovery","liquid recovery","combined vapor and liquid recovery","oil separation"],"answer":"liquid recovery","why":"Liquid recovery moves the bulk of charge fastest, so it is done first.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-cer
