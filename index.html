nswer":"4 inches of Hg vacuum","why":"Pre-1993 equipment, <200 lb high-pressure charge: evacuate to 4 in Hg.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-057","type":"II","topic":"cycle-components-mechanics","q":"The evaporation temperature of R-410a at 100 psig is about","options":["0 F","30 F","90 F","120 F"],"answer":"30 F","why":"R-410A saturates near 30F at about 100 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-058","type":"II","topic":"diagnosis-by-symptom","q":"Noncondensables in a system cause a","options":["lower suction pressure","higher suction pressure","lower discharge pressure","higher discharge pressure"],"answer":"higher discharge pressure","why":"Noncondensables (air) raise head/discharge pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-059","type":"II","topic":"charging","q":"When charging an R-410a system that uses a water-cooled condenser, you must first charge with vapor to a pressure of at least _______ before switching to liquid charging","options":["20 psig","120 psig","220 psig","320 psig"],"answer":"120 psig","why":"Add vapor to raise pressure above freezing before liquid charging an R-410A system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-060","type":"II","topic":"recovery-equipment-certification","q":"R-410a requires recovery tanks rated for at least","options":["240 psig","300 psig","400 psig","500 psig"],"answer":"400 psig","why":"R-410A recovery tanks must be rated at least 400 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-061","type":"II","topic":"recovery-technique-sequence","q":"The recovery rate can be increased by","options":["packing the recovery vessel in ice","heating the recovery vessel","using a smaller recovery vessel","using a standard vacuum pump"],"answer":"packing the recovery vessel in ice","why":"Cooling the recovery cylinder lowers its pressure, speeding recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-062","type":"II","topic":"diagnosis-by-symptom","q":"Oil foaming usually occurs in the","options":["condenser","evaporator","compressor","expansion device"],"answer":"compressor","why":"Refrigerant boiling out of oil at startup causes foaming in the compressor crankcase.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-063","type":"II","topic":"evacuation-dehydration","q":"During the evacuation of a system that contains large amounts of moisture, it may be necessary to increase pressure in the system with _______ to counteract freezing of the moisture","options":["hydrogen","oxygen","air","nitrogen"],"answer":"nitrogen","why":"Breaking vacuum with dry nitrogen prevents moisture from freezing during dehydration.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-064","type":"II","topic":"recovery-technique-sequence","q":"Prior to replacing the condenser coil in a high pressure system, the refrigerant was recovered and stored in a refillable cylinder. The refrigerant","options":["can probably be charged back into the system","should probably be replaced with R-410a","must be reclaimed","must be destroyed"],"answer":"can probably be charged back into the system","why":"Refrigerant recovered on-site for the same system can be returned to it.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-065","type":"II","topic":"cycle-components-mechanics","q":"The evaporation temperature of R-134a at 0 psig is","options":["-21 F","-15 F","-5 F","-1 F"],"answer":"-15 F","why":"R-134a boils near -15F at atmospheric pressure (0 psig).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-066","type":"II","topic":"refrigerant-substitution-retrofit","q":"When servicing a 60-ton packaged rooftop unit, the easiest way to check the type of refrigerant it uses is to","options":["use your service gauge set and a refrigerant card","ask the owner","look at the unit nameplate","determine the condenser size"],"answer":"look at the unit nameplate","why":"The nameplate states the refrigerant type directly.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-067","type":"II","topic":"leak-rates-repair-timelines","q":"EPA regulations require that any appliances containing more than 50 pounds of refrigerant, except for commercial and industrial process refrigeration, must be repaired when the leak-rate exceeds _______ of the charge per year","options":["5 percent","10 percent","25 percent","35 percent"],"answer":"10 percent","why":"Comfort-cooling appliances >50 lb must be repaired when leak rate exceeds 10%/yr.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-068","type":"II","topic":"leak-rates-repair-timelines","q":"EPA regulations require that leaking commercial or industrial process refrigeration equipment must be repaired when the leak-rate exceeds _______ of the charge per year","options":["5%","15%","25%","30%"],"answer":"30%","why":"Industrial process refrigeration must be repaired when leak rate exceeds 30%/yr (per the source key; current EPA guidance commonly cites 35%).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-069","type":"II","topic":"refrigerant-substitution-retrofit","q":"You are going to service an older residential split-system air conditioner. You would expect to find the system charged with which refrigerant?","options":["R-11","R-12","R-22","R-502"],"answer":"R-22","why":"Older residential split systems are charged with R-22.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-070","type":"II","topic":"safety-cylinders","q":"For what refrigerant is an equipment room refrigerant monitor required under ASHRAE Standard 15?","options":["R-12","R-134a","R-11","R-123"],"answer":"R-123","why":"R-123 is toxic, so ASHRAE 15 requires an equipment-room monitor.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-071","type":"II","topic":"leak-detection-methods","q":"Heat pumps that use R-134a should be leak-checked with","options":["CFCs","HCFCs","compressed dry air","pressurized nitrogen"],"answer":"pressurized nitrogen","why":"Dry nitrogen is the proper leak-check pressurizing gas.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-072","type":"II","topic":"diagnosis-by-symptom","q":"On a high-pressure system, _______ is an indicator of a possible leak","options":["high head pressure","low water temperature","excessive superheat","frequent purging"],"answer":"excessive superheat","why":"Low charge from a leak raises superheat.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-073","type":"II","topic":"recovery-equipment-certification","q":"System-dependent recovery equipment CANNOT be used when","options":["the appliance is leaking","the compressor of the appliance is operational","the ambient temperature is over 115 F","the appliance contains over 15 pounds of refrigerant"],"answer":"the appliance contains over 15 pounds of refrigerant","why":"System-dependent (passive) recovery is prohibited on appliances over 15 lb charge.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-074","type":"II","topic":"evacuation-dehydration","q":"Moisture is removed from a system by","options":["purging the condenser","draining the oil separator","reducing water flow to the condenser","using a filter drier"],"answer":"using a filter drier","why":"The filter-drier adsorbs residual moisture from the system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"II-075","type":"II","topic":"cycle-components-mechanics","q":"Which component is not part of the low side of a system?","options":["Evaporator","Receiver","Suction line","Accumulator"],"answer":"Receiver","why":"The receiver is on the high-pressure (liquid) side, not the low side.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-2/high-pressure-practice-test-3/"},{"id":"III-001","type":"III","topic":"recovery-procedure-chiller","q":"A typical setting for the high-pressure cut-out control on a recovery unit used for evacuating refrigerant from a low-pressure chiller is","options":["2 psig","5 psig","10 psig","15 psig"],"answer":"10 psig","why":"Recovery units on low-pressure chillers cut out at 10 psig to avoid rupture-disc failure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-002","type":"III","topic":"leak-detection-pressure-limits","q":"A charged low pressure refrigeration system can be efficiently leak-checked by","options":["adding compressed air since it will be removed from the system by the purging unit","operating the purge system","adding HCFC-22","raising system pressure by heating with circulated hot water or heating blankets"],"answer":"raising system pressure by heating with circulated hot water or heating blankets","why":"Heating raises low-side pressure above atmospheric so leaks can be detected without exceeding limits.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-003","type":"III","topic":"low-pressure-fundamentals","q":"The existence of air in a low pressure system causes","options":["low head pressure","low suction pressure","high head pressure","high liquid level"],"answer":"high head pressure","why":"Noncondensable air raises condensing (head) pressure.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-004","type":"III","topic":"safety-oel","q":"Which safety precaution should be adhered to for low pressure systems?","options":["Do not siphon refrigerant by mouth","Avoid spilling liquid refrigerant on your skin","Use gloves and safety goggles when working with liquid refrigerant","All of the above"],"answer":"All of the above","why":"All listed precautions apply when handling liquid refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-005","type":"III","topic":"refrigerant-id-substitution","q":"Refrigerant-11 (R-11) at 14.7 psia, will boil at about","options":["60.3 F","74.5 F","79.7 F","80.2 F"],"answer":"74.5 F","why":"R-11 boils near 74.5F at atmospheric pressure (14.7 psia).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-006","type":"III","topic":"water-side-tube-leaks","q":"When there is excessive moisture collecting in the purge unit of a low pressure refrigeration system, this indicates that","options":["the system with contaminated refrigerant","the condenser or chiller barrel tubes are leaking","the purge unit is not operating properly","the purge unit needs adjustment"],"answer":"the condenser or chiller barrel tubes are leaking","why":"Water in the purge points to leaking water-side tubes.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-007","type":"III","topic":"safety-oel","q":"ASHRAE Standard 15-1994 requires equipment room refrigerant sensors for what safety group classification?","options":["A1","B2","A2","All refrigerant safety groups"],"answer":"All refrigerant safety groups","why":"ASHRAE 15-1994 requires sensors regardless of refrigerant safety group.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-008","type":"III","topic":"charging-procedure","q":"When recharging a refrigeration system with R-11, what vapor pressure is necessary in the shells before charging with liquid?","options":["21.1 inch Hg vacuum","19.7 inch Hg vacuum","18.1 inch Hg vacuum","16.9 inch Hg vacuum"],"answer":"16.9 inch Hg vacuum","why":"Vapor pressure must be raised to ~16.9 in Hg vacuum before liquid charging to prevent freezing.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-009","type":"III","topic":"recovery-vacuum-levels","q":"After reaching the required recovery vacuum on a chiller, you should","options":["Immediately disconnect the recycling or recovery equipment and open the system for service","wait for at least a few minutes to see if the system pressure rises, indicating there is still refrigerant in liquid form or in the oil","Immediately break the vacuum with nitrogen and open the system for service","Immediately pressurize the system with nitrogen and perform a leak check"],"answer":"wait for at least a few minutes to see if the system pressure rises, indicating there is still refrigerant in liquid form or in the oil","why":"A pressure rise after vacuum indicates remaining refrigerant in oil/liquid.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-010","type":"III","topic":"water-side-tube-leaks","q":"A hydrostatic tube test kit is used to","options":["blow all water from the tubes","remove any water from the machine","vent refrigerant","determine if a tube leaks"],"answer":"determine if a tube leaks","why":"Hydrostatic tube test kits locate leaking tubes.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-011","type":"III","topic":"charging-procedure","q":"When charging a chiller, refrigerant vapor is introduced into the system before charging with liquid refrigerant. This is because","options":["charging with vapor increases pressure slowly, preventing failure of the rupture disk","charging with vapor is faster than charging with liquid","liquid charging is more difficult to control than vapor charging","liquid charged into a deep vacuum will cause the refrigerant to boil and may lower temperatures enough to freeze the water in the tubes"],"answer":"liquid charged into a deep vacuum will cause the refrigerant to boil and may lower temperatures enough to freeze the water in the tubes","why":"Vapor charging first raises pressure to prevent flash-freezing of tube water.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-012","type":"III","topic":"recovery-procedure-chiller","q":"When evacuating a system, the use of too large a vacuum pump can cause","options":["trapped water to freeze","trapped oil to freeze","trapped refrigerant to freeze","valves to freeze"],"answer":"trapped water to freeze","why":"Too-fast evacuation drops pressure so quickly that trapped water freezes.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-013","type":"III","topic":"low-pressure-fundamentals","q":"On a low pressure chiller with an open-type compressor, the _______ is/are very susceptible to leaks.","options":["chiller tubes","shaft seal","charging connections","shaft bearings"],"answer":"shaft seal","why":"Open-drive compressors leak at the rotating shaft seal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-014","type":"III","topic":"purge-units","q":"What steps may be taken to prevent air accumulation into an idle low-pressure refrigeration system?","options":["Leave the purge unit on at all times","System pressure should be maintained slightly above atmospheric pressure","Open the air vents on the condenser","Intermittently operate the system with no load"],"answer":"System pressure should be maintained slightly above atmospheric pressure","why":"Positive pressure keeps air from leaking into an idle low-pressure system.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-015","type":"III","topic":"regulations-recordkeeping","q":"Commercial and industrial process refrigeration systems must be repaired when the leak rate exceeds _______ percent of the charge per year.","options":["5 percent","15 percent","20 percent","30 percent"],"answer":"30 percent","why":"Industrial process refrigeration trigger rate is 30% (era-specific exam answer).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-016","type":"III","topic":"recovery-procedure-chiller","q":"When recovering vapor from a low pressure refrigeration system,","options":["the water pumps should be on, and the recovery compressor should be off","the system water pumps should be on, the recovery compressor should be on, and the recovery condenser water should be off","the system water pumps, the recovery compressor, and the recovery condenser water should all be on","the system water pumps should be off, and the recovery compressor should be on"],"answer":"the system water pumps, the recovery compressor, and the recovery condenser water should all be on","why":"All water flows and the recovery compressor must run during vapor recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-017","type":"III","topic":"purge-units","q":"Where does refrigerant go after it leaves the purge unit of a low pressure centrifugal system?","options":["The evaporator","The condenser","The compressor intercooler","The recovery service vessel"],"answer":"The evaporator","why":"Purge-recovered refrigerant returns to the evaporator (low side).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-018","type":"III","topic":"purge-units","q":"The purge unit takes its suction from the","options":["top of the condenser","compressor oil sump","top of the evaporator","suction elbow"],"answer":"top of the condenser","why":"Noncondensables collect at the top of the condenser, where the purge draws from.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-019","type":"III","topic":"regulations-recordkeeping","q":"Which of the following repairs would ALWAYS be considered a \"major\" repair under EPA's regulations?","options":["Replacement of an evaporator coil","Replacement of a filter-drier","Replacement of a switch","Replacement of a purge unit"],"answer":"Replacement of an evaporator coil","why":"Evaporator coil replacement is defined as a major repair by EPA.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-020","type":"III","topic":"charging-procedure","q":"Charging liquid refrigerant into a refrigeration system when it is under a 29-inch Hg vacuum can cause the","options":["liquid refrigerant to absorb excess moisture","purge unit to operate","system water to freeze","liquid refrigerant to freeze"],"answer":"system water to freeze","why":"Liquid flashing in deep vacuum freezes the chiller water.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-021","type":"III","topic":"recovery-vacuum-levels","q":"According to the EPA there is approximately _______ of refrigerant vapor left in an average 350 ton R-11 chiller at 0 psig pressure once all the R-11 liquid has been removed.","options":["0 lbs","10 lbs","20 lbs","100 lbs"],"answer":"100 lbs","why":"~100 lbs of vapor remains at 0 psig, requiring further vapor recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-022","type":"III","topic":"recovery-procedure-chiller","q":"An oil sample should be taken when","options":["a new filter drier has been installed","there has been a compressor burnout","the unit is not cooling properly","recycled refrigerant has been added to the unit"],"answer":"there has been a compressor burnout","why":"Burnout contaminates oil, so a sample is taken to assess acid/contamination.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-023","type":"III","topic":"purge-units","q":"Both CFC-11 and HCFC-123 chillers require purge units because","options":["the purge units remove moisture","the system operates below atmospheric pressure","purge units remove refrigerant from the oil sump","purge units remove CFCs from the chiller"],"answer":"the system operates below atmospheric pressure","why":"Sub-atmospheric operation lets air leak in, so purge units are required.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-024","type":"III","topic":"recovery-procedure-chiller","q":"Refrigerant recovery typically starts with _______ because it is faster.","options":["vapor recovery","liquid recovery","combined vapor and liquid recovery","oil separation"],"answer":"liquid recovery","why":"Liquid recovery moves the bulk of charge fastest, so it is done first.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-025","type":"III","topic":"leak-detection-pressure-limits","q":"Under EPA regulations, _______ is used to pressurize a low-pressure chiller for the purpose of opening the system for a non-major repair.","options":["adding nitrogen","warming the refrigerant","adding compressed air","adding carbon dioxide"],"answer":"warming the refrigerant","why":"Warming raises internal pressure above atmospheric without adding noncondensables.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-1/"},{"id":"III-026","type":"III","topic":"recovery-procedure-chiller","q":"The primary water source for a recovery unit condensing coil is","options":["chilled water","condenser water","the local municipal water supply","de-ionized water"],"answer":"the local municipal water supply","why":"Recovery unit condensing coils are cooled by municipal/city water.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-027","type":"III","topic":"recovery-vacuum-levels","q":"Which statement is NOT true of recycling and recovery equipment manufactured after November 15 1993?","options":["It must be tested by an EPA-approved third party","It must meet vacuum standards more stringent than those met by equipment manufactured before November 1 1993","It must be equipped with low-loss fittings","It must be able to handle more than one refrigerant"],"answer":"It must be able to handle more than one refrigerant","why":"Multi-refrigerant capability is not an EPA requirement for post-1993 equipment.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-028","type":"III","topic":"recovery-vacuum-levels","q":"A system does not have to be evacuated all the way to the required level when","options":["the repair is major","the repair is followed by an evacuation of the appliance to the environment","the appliance is being disposed","leaks in the appliance make evacuation to the prescribed level impossible"],"answer":"leaks in the appliance make evacuation to the prescribed level impossible","why":"EPA waives the required vacuum level when leaks make it unattainable.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-029","type":"III","topic":"purge-units","q":"Which action listed below is the proper method to reduce refrigerant loss from a purge unit on a CFC-11 chiller?","options":["Leak-test and repair the chiller","Seal the purge-unit discharge","Pipe purge-unit back into the low side","Pipe purge unit into recovery unit"],"answer":"Leak-test and repair the chiller","why":"Fixing leaks reduces air ingress, cutting purge runtime and refrigerant loss.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-030","type":"III","topic":"charging-procedure","q":"Identify the pressure corresponding to 32F for R-123:","options":["23 inches of Hg vacuum","20 inches of Hg vacuum","17 inches of Hg vacuum","11 inches of Hg vacuum"],"answer":"20 inches of Hg vacuum","why":"R-123 saturates near 20 in Hg vacuum at 32F.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-031","type":"III","topic":"water-side-tube-leaks","q":"What precaution should be taken prior to recovering refrigerant from a chiller suspected of having tube leaks?","options":["Drain the water sides of the evaporator and condenser","Run the circulating pumps","Be certain the purge unit is operating","Open the condenser vents"],"answer":"Drain the water sides of the evaporator and condenser","why":"Draining water prevents it from being drawn into the refrigerant side during recovery.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-032","type":"III","topic":"rupture-disc-safety","q":"Pressure relief valves must never be","options":["installed in series","installed in parallel","installed vertically","installed horizontally"],"answer":"installed in series","why":"Relief valves in series can block each other and defeat their safety function.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-033","type":"III","topic":"recovery-procedure-chiller","q":"If you are going to be removing oil from a low-pressure system, you should heat the oil because","options":["you can warm your hands on the container","less refrigerant will be contained in the oil at high temperatures","warmer oil has a lower viscosity and flows more easily","it shows that the heater is working"],"answer":"less refrigerant will be contained in the oil at high temperatures","why":"Heating drives dissolved refrigerant out of the oil before disposal.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-034","type":"III","topic":"recovery-procedure-chiller","q":"After recovering the liquid refrigerant you must","options":["recover the refrigerant vapor","pressurize the system with nitrogen","remove the oil from the system","solvent-flush the entire system"],"answer":"recover the refrigerant vapor","why":"Vapor recovery follows liquid recovery to reach required levels.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-035","type":"III","topic":"regulations-recordkeeping","q":"EPA regulations require that any appliances containing more than 50 pounds of refrigerant, except for commercial and industrial process refrigeration, must be repaired when the leak-rate exceeds _____ of the charge per year.","options":["5 percent","10 percent","20 percent","35 percent"],"answer":"10 percent","why":"Comfort-cooling chillers >50 lb trigger repair at 10% annual leak rate (era-specific answer).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-036","type":"III","topic":"recovery-vacuum-levels","q":"If you are using a recovery machine manufactured BEFORE November 15 1993, you must evacuate any low-pressure appliance to _____ before making a major repair.","options":["0 psig","15 inches of Hg vacuum","25 inches of Hg vacuum","25 mm of Hg absolute"],"answer":"25 inches of Hg vacuum","why":"Pre-Nov-1993 equipment must reach 25 in Hg vacuum on low-pressure appliances.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-037","type":"III","topic":"water-side-tube-leaks","q":"On low-pressure chillers, moisture typically enters the refrigerant system through","options":["air leaks in the rupture disk assembly","tube leaks","air leaks from areas with gaskets or fittings","air leaks from the charging valve"],"answer":"air leaks from areas with gaskets or fittings","why":"Sub-atmospheric chillers draw in moist air through gasket/fitting leaks.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-038","type":"III","topic":"charging-procedure","q":"Refrigerant-11 at a pressure of 17 inches Hg vacuum has a saturation temperature of","options":["30 F","35 F","40 F","44 F"],"answer":"35 F","why":"R-11 saturates near 35F at 17 in Hg vacuum.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-039","type":"III","topic":"charging-procedure","q":"The lowest access point on a low-pressure centrifugal air-conditioning unit is the","options":["evaporator charging valve","condenser service valve","compressor cooler jacket","purge unit exhaust port"],"answer":"evaporator charging valve","why":"The evaporator charging valve is the lowest charging access point.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-040","type":"III","topic":"rupture-disc-safety","q":"A rupture disc on a recovery vessel for low-pressure refrigerants relieves at","options":["5 psig","10 psig","15 psig","20 psig"],"answer":"15 psig","why":"Low-pressure recovery vessel rupture discs are rated at 15 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-041","type":"III","topic":"recovery-vacuum-levels","q":"According to ASHRAE Guideline 3-1996, if the pressure in a system rises from 1 mm Hg to a level above _____ during a standing vacuum test, the system should be checked for leaks.","options":["1.5 mm Hg","2.0 mm Hg","2.5 mm Hg","3.0 mm Hg"],"answer":"2.5 mm Hg","why":"A rise above 2.5 mm Hg in the standing vacuum test indicates a leak.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-042","type":"III","topic":"recovery-procedure-chiller","q":"During chiller evacuation, water is circulated to","options":["speed up the recovery process","prevent loss of refrigerant to the atmosphere","prevent freezing of the water","maintain constant refrigerant pressure"],"answer":"prevent freezing of the water","why":"Circulating water adds heat to keep tube water from freezing during evacuation.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-043","type":"III","topic":"charging-procedure","q":"When charging an R-410a water chiller, you must first charge with vapor to a pressure of at least _____ before switching to liquid charging.","options":["20 psig","120 psig","220 psig","320 psig"],"answer":"120 psig","why":"Vapor pressure must reach ~120 psig before liquid charging to avoid freezing tube water.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-044","type":"III","topic":"rupture-disc-safety","q":"If you leak test a low-pressure chiller with nitrogen in excess of 10 psig you could cause the _____ to fail.","options":["condenser tubes","purge unit shells","evaporator tubes","rupture disc"],"answer":"rupture disc","why":"Exceeding 10 psig can blow the low-pressure system's rupture disc.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-045","type":"III","topic":"safety-oel","q":"ASHRAE Standard 15-1994 requires that each machinery room must activate an alarm and mechanical ventilation before refrigerant concentrations exceed","options":["the EEL (Emergency Exposure Limit)","the TLV - TWA (Threshold Limit Value - Time Weighted Average)","the UTL (Upper Threshold Limit)","the COP (Coefficient of Performance)"],"answer":"the TLV - TWA (Threshold Limit Value - Time Weighted Average)","why":"Ventilation/alarms trigger before the TLV-TWA exposure limit is exceeded.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-046","type":"III","topic":"regulations-recordkeeping","q":"Which repair WOULD NOT fall under the EPA definition for major maintenance, service, or repair?","options":["Replacing an oil filter","Replacing the compressor","Re-tubing a condenser","Replacing a fin and tube forced air evaporator coil"],"answer":"Replacing an oil filter","why":"Oil filter replacement is minor, not a major repair.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-047","type":"III","topic":"charging-procedure","q":"Refrigerant is added to a centrifugal machine through the","options":["float valve","compressor service valve","condenser charging valve","evaporator charging valve"],"answer":"evaporator charging valve","why":"Centrifugal chillers are charged through the evaporator (low side) charging valve.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-048","type":"III","topic":"purge-units","q":"What is meant by the term \"high efficiency purge unit\"?","options":["Those purge units which discharge a high percentage of refrigerant with the air they remove","Those purge units which discharge a low percentage of refrigerant with the air they remove","Those purge units which draw very little electrical power","None of the above"],"answer":"Those purge units which discharge a low percentage of refrigerant with the air they remove","why":"High-efficiency purges vent air while losing little refrigerant.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-049","type":"III","topic":"purge-units","q":"The primary purpose of a purge unit on a CFC-11 chiller is to","options":["remove CFCs from the system","condense air out of the system","condense water out of the system","remove noncondensables from the system"],"answer":"remove noncondensables from the system","why":"Purge units remove noncondensable air/gases from the chiller.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-050","type":"III","topic":"recovery-vacuum-levels","q":"If you are using a recovery machine manufactured AFTER November 15 1993, you must evacuate any low pressure appliance to _____ before making a major repair.","options":["0 psig","15 inches of Hg vacuum","25 inches of Hg vacuum","25mm of Hg absolute"],"answer":"25mm of Hg absolute","why":"Post-Nov-1993 equipment must reach 25 mm Hg absolute on low-pressure appliances.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-2/"},{"id":"III-051","type":"III","topic":"recovery-procedure-chiller","q":"During the evacuation of a system containing large amounts of moisture, you can prevent freezing of this moisture by increasing the pressure with","options":["nitrogen gas","R-22","air","oxygen"],"answer":"nitrogen gas","why":"Nitrogen raises pressure to prevent moisture from freezing during evacuation.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-052","type":"III","topic":"water-side-tube-leaks","q":"If you suspect a leak in the water box of a chiller, you should place the leak detector probe ________, and sniff for refrigerants.","options":["at the rupture disc","through the vent valve","through a test plug","through a drain valve"],"answer":"through a drain valve","why":"Probing the water-box drain valve detects refrigerant from leaking tubes.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-053","type":"III","topic":"charging-procedure","q":"To determine how much vapor to charge into an evacuated chiller, you should charge with vapor until","options":["the system pressure corresponds to a refrigerant saturation temperature of 36 F","the recovery unit liquid level drops","you have charged with vapor for 15 minutes","the recovery unit pressure drops"],"answer":"the system pressure corresponds to a refrigerant saturation temperature of 36 F","why":"Vapor charging stops at the pressure for 36F saturation (above freezing) before liquid.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-054","type":"III","topic":"safety-oel","q":"ASHRAE Standard 15-1994 requires the use of room sensors and alarms to detect","options":["refrigerant leaks","high levels of ozone","refrigerant contamination","excessive oxygen levels"],"answer":"refrigerant leaks","why":"ASHRAE 15 room sensors/alarms detect refrigerant leaks.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-055","type":"III","topic":"rupture-disc-safety","q":"The discharge from a rupture disc should be piped ________ for venting.","options":["outdoors","inside the machinery room","to the evaporator","to the duct system"],"answer":"outdoors","why":"Rupture-disc discharge must be vented outdoors for safety.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-056","type":"III","topic":"rupture-disc-safety","q":"A centrifugal chiller's rupture disc is connected to the chiller's","options":["condenser","evaporator","liquid line","economizer"],"answer":"evaporator","why":"On low-pressure chillers the rupture disc is mounted on the evaporator (low side).","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-057","type":"III","topic":"recovery-procedure-chiller","q":"To remove ice from sight glasses or viewing glasses, use","options":["R-11 refrigerant","an alcohol spray","water","a screw driver or flat file"],"answer":"an alcohol spray","why":"Alcohol spray melts ice on sight glasses without damaging them.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-058","type":"III","topic":"leak-detection-pressure-limits","q":"The maximum test pressure for leak testing a low-pressure centrifugal is","options":["0 psig","10 psig","25 psig","50 psig"],"answer":"10 psig","why":"Low-pressure centrifugal leak testing must not exceed 10 psig.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-059","type":"III","topic":"purge-units","q":"Excessive running of a purge system on a low-pressure chiller generally indicates that the","options":["air sensors are faulty","ambient temperature is too high","efficiency of the purge unit is too low","system is leaking"],"answer":"system is leaking","why":"Constant purge runtime means air is entering through a leak.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"},{"id":"III-060","type":"III","topic":"rupture-disc-safety","q":"The typical design burst pressure of a rupture disc on a low-pressure centrifugal air-conditioning system is set at","options":["7 psi","10 psi","15 psi","28 psi"],"answer":"15 psi","why":"Low-pressure centrifugal rupture discs typically burst at 15 psi.","source":"https://nationaltradesman.com/building-trades/hvac-techs/epa-608-certification-info/608-types/type-3/low-pressure-practice-test-3/"}];
const TOPIC_META = {"recovery-levels":["Recovery % & cylinder pressures",2],"passive-vs-active-recovery":["Passive vs. active recovery",2],"access-valves-piercing":["Access valves / process stub",2],"recovery-technique-compressor":["Recovery technique (compressor)",1],"recovery-equipment-requirements":["Recovery equipment rules",1],"refrigerant-id-substitution":["Refrigerant ID & substitution",1],"sales-restrictions":["Sales restrictions",1],"disposal":["Disposal & shipping (DOT)",1],"leak-repair":["Leak repair rules",1],"safety":["Safety & hazards",1],"regulations-recordkeeping":["Regulations & recordkeeping",1],"definitions-scope":["Definitions & scope",1],"leak-rates-repair-timelines":["Leak rates & repair timelines",2],"recovery-requirements-vacuum":["Recovery vacuum levels",2],"diagnosis-by-symptom":["Diagnose by symptom",2],"refrigerant-substitution-retrofit":["Refrigerant substitution / retrofit",2],"cycle-components-mechanics":["Cycle components & mechanics",1],"recovery-technique-sequence":["Recovery technique & sequence",1],"recovery-equipment-certification":["Recovery equipment certification",1],"evacuation-dehydration":["Evacuation & dehydration",1],"charging":["Charging procedure",1],"leak-detection-methods":["Leak detection methods",1],"safety-cylinders":["Safety & cylinders",1],"recovery-vacuum-levels":["Recovery vacuum (25mm abs)",2],"purge-units":["Purge units",2],"rupture-disc-safety":["Rupture disc & safety",2],"low-pressure-fundamentals":["Low-pressure fundamentals",2],"recovery-procedure-chiller":["Chiller recovery procedure",1],"charging-procedure":["Charging procedure (chiller)",1],"leak-detection-pressure-limits":["Leak test pressure limits",1],"water-side-tube-leaks":["Water-side / tube leaks",1],"safety-oel":["Safety & exposure limits",1]};
const TYPE_NAMES = {"I":"Type I \u2014 Small Appliances","II":"Type II \u2014 High Pressure","III":"Type III \u2014 Low Pressure"};
const PASS = 0.72; // 18/25 proctored
const KEY = "epa608_state_v1";

let S = load();
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || blank(); }catch(e){ return blank(); } }
function blank(){ return { q:{}, topic:{}, answered:0, correct:0 }; }
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function qs(id){ return S.q[id] || (S.q[id]={box:0,seen:0,right:0,last:0}); }
function tname(t){ return (TOPIC_META[t]&&TOPIC_META[t][0]) || t; }
function tprio(t){ return (TOPIC_META[t]&&TOPIC_META[t][1]) || 1; }

// ---------- selection (Leitner + weak-topic + priority weighting) ----------
function topicAccuracy(t){ const s=S.topic[t]; if(!s||!s.seen) return null; return s.right/s.seen; }
function weight(q){
  const st = S.q[q.id] || {box:0,seen:0};
  let w = [6,5,3,2,1.2,0.7][Math.min(st.box,5)];      // unseen/low box = higher
  if(st.seen===0) w = 7;                               // brand-new gets a boost
  const acc = topicAccuracy(q.topic);
  if(acc!==null) w *= (1.6 - acc);                     // weaker topic = higher
  w *= (tprio(q.topic)===2 ? 1.5 : 1);                 // exam-priority topics up
  return Math.max(w,0.2);
}
function pickAdaptive(pool, exclude){
  const cands = pool.filter(q=>q.id!==exclude);
  let tot=0; const ws=cands.map(q=>{const w=weight(q);tot+=w;return w;});
  let r=Math.random()*tot;
  for(let i=0;i<cands.length;i++){ r-=ws[i]; if(r<=0) return cands[i]; }
  return cands[cands.length-1];
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ---------- session state ----------
let SESSION=null;
function startSession(mode, pool, opts){
  opts=opts||{};
  SESSION={mode, pool, count:0, right:0, exclude:null, examList:null, examIdx:0, examAns:[], limit:opts.limit||0};
  if(mode==='exam'){ SESSION.examList=shuffle(pool).slice(0,Math.min(25,pool.length)); }
  nextQuestion();
}
function nextQuestion(){
  if(SESSION.mode==='exam'){
    if(SESSION.examIdx>=SESSION.examList.length){ return renderExamResult(); }
    renderQuestion(SESSION.examList[SESSION.examIdx]);
    return;
  }
  if(SESSION.limit && SESSION.count>=SESSION.limit){ return renderSessionDone(); }
  if(!SESSION.pool.length){ return renderEmpty(); }
  const q=pickAdaptive(SESSION.pool, SESSION.exclude);
  SESSION.exclude=q.id;
  renderQuestion(q);
}

function answer(q, choice){
  const correct = choice===q.answer;
  if(SESSION.mode==='exam'){
    SESSION.examAns.push({q, choice, correct});
    SESSION.examIdx++;
    // record stats silently
    record(q, correct);
    nextQuestion();
    return;
  }
  SESSION.count++; if(correct) SESSION.right++;
  record(q, correct);
  showFeedback(q, choice, correct);
}
function record(q, correct){
  const st=qs(q.id); st.seen++; if(correct){st.right++; st.box=Math.min(5,st.box+1);} else {st.box=1;}
  st.last=correct?1:0;
  const ts=S.topic[q.topic]||(S.topic[q.topic]={seen:0,right:0}); ts.seen++; if(correct) ts.right++;
  S.answered++; if(correct) S.correct++;
  save();
}

// ---------- views ----------
function go(v){ if(v==='home'){ SESSION=null; renderHome(); } }
function el(html){ document.getElementById('view').innerHTML=html; }

function overallPct(){ return S.answered? Math.round(100*S.correct/S.answered):0; }
function typePool(t){ return BANK.filter(q=>q.type===t); }
function masteredCount(t){ return typePool(t).filter(q=>(S.q[q.id]&&S.q[q.id].box>=4)).length; }

function renderHome(){
  const types=['I','II','III'];
  let cards = types.map(t=>{
    const pool=typePool(t); const m=masteredCount(t); const pc=Math.round(100*m/pool.length);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <b>${TYPE_NAMES[t]}</b><span class="pill">${pool.length} Q</span></div>
      <div class="statline"><span>Mastered ${m}/${pool.length}</span><span>${pc}%</span></div>
      <div class="bar"><i style="width:${pc}%"></i></div>
      <div class="row" style="margin-top:12px">
        <button class="btn gold" onclick="beginAdaptive('${t}')"><span class="t">Adaptive drill</span><span class="d">Targets your weak spots</span></button>
        <button class="btn" onclick="beginExam('${t}')"><span class="t">Exam sim</span><span class="d">25 Q · ${Math.round(PASS*100)}% to pass</span></button>
      </div>
      <button class="link" onclick="showTopics('${t}')">View topic breakdown ▸</button>
    </div>`;
  }).join('');

  el(`
    <div class="card" style="background:linear-gradient(135deg,#2a2310,#262626);border-color:var(--gold-dim)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><b>Overall accuracy</b><div class="sub">${S.answered} answered all-time</div></div>
        <div class="big" style="font-size:34px;margin:0;color:var(--gold)">${overallPct()}%</div>
      </div>
    </div>
    <h2>Study a section</h2>
    ${cards}
    <h2>Mixed</h2>
    <button class="btn" onclick="beginAdaptive('ALL')"><span class="t">Adaptive — all three Types</span><span class="d">Exam-realistic random mix, weighted to your gaps</span></button>
    <button class="btn" onclick="beginReview()"><span class="t">Review my misses</span><span class="d">Only questions you've gotten wrong</span></button>
    <h2>Tutor</h2>
    <a class="btn gold" href="./tutor.html" style="text-decoration:none"><span class="t">Ask the AI Tutor ▸</span><span class="d">Explain anything, quiz you live, work through your weak spots</span></a>
    <div class="note">Progress is saved on this device. ${BANK.length} verified real-pool questions.<br>
    <button class="link" onclick="resetAll()">Reset all progress</button></div>
  `);
}

function showTopics(t){
  const pool=typePool(t);
  const topics=[...new Set(pool.map(q=>q.topic))].sort((a,b)=>tprio(b)-tprio(a));
  let rows=topics.map(tp=>{
    const acc=topicAccuracy(tp); const pc=acc===null?0:Math.round(acc*100);
    const star=tprio(tp)===2?'<span class="pill star">KEY</span> ':'';
    const n=pool.filter(q=>q.topic===tp).length;
    return `<div class="topicrow"><div class="nm">${star}${tname(tp)} <span style="color:var(--muted)">(${n})</span></div>
      <div class="bar"><i style="width:${pc}%"></i></div><div class="pc">${acc===null?'—':pc+'%'}</div></div>
      <button class="btn" style="padding:9px 14px;margin:-2px 0 12px" onclick="beginTopic('${t}','${tp}')"><span class="d">Drill this topic</span></button>`;
  }).join('');
  el(`<div class="card"><b>${TYPE_NAMES[t]}</b><div class="sub" style="margin-bottom:10px">KEY = heavily tested. Drill priority topics first.</div>${rows}</div>
      <button class="btn gold" onclick="renderHome()"><span class="t">◂ Back</span></button>`);
}

function beginAdaptive(t){ const pool = t==='ALL'?BANK.slice():typePool(t); startSession('adaptive',pool,{limit:0}); }
function beginExam(t){ startSession('exam', typePool(t)); }
function beginTopic(t,tp){ startSession('adaptive', typePool(t).filter(q=>q.topic===tp), {limit:0}); }
function beginReview(){
  const pool=BANK.filter(q=>S.q[q.id]&&S.q[q.id].last===0&&S.q[q.id].seen>0);
  if(!pool.length){ el(`<div class="card center"><div class="big pass">✓</div><b>Nothing to review.</b><div class="note">You haven't missed anything yet (or you've fixed them all).</div></div><button class="btn gold" onclick="renderHome()"><span class="t">◂ Home</span></button>`); return; }
  startSession('adaptive', pool, {limit:0});
}

let CUR=null;
function renderQuestion(q){
  CUR={q, opts:shuffle(q.options), answered:false};
  const isExam=SESSION.mode==='exam';
  const star=tprio(q.topic)===2?'<span class="pill star">KEY</span> ':'';
  const counter = isExam ? `Q ${SESSION.examIdx+1} / ${SESSION.examList.length}`
                         : `${SESSION.count} done · ${SESSION.count?Math.round(100*SESSION.right/SESSION.count):0}%`;
  let opts=CUR.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="choose(${i})"><span class="mk">${String.fromCharCode(65+i)}</span>${esc(o)}</button>`).join('');
  el(`
    <div class="card">
      <div class="qmeta"><span>${star}Type ${q.type} · ${tname(q.topic)}</span><span>${counter}</span></div>
      <div class="qtext">${esc(q.q)}</div>
      <div id="opts">${opts}</div>
      <div class="why" id="why"></div>
      <div class="footbar">
        <div class="prog">${isExam?'No feedback until the end — just like the real exam.':''}</div>
        <button class="nextbtn" id="next" onclick="nextQuestion()" ${isExam?'':'disabled'}>${isExam?'Skip':'Next'} ▸</button>
      </div>
    </div>
    <button class="link" onclick="go('home')">End session</button>
  `);
}
function choose(i){
  if(CUR.answered && SESSION.mode!=='exam') return;
  const q=CUR.q, choice=CUR.opts[i];
  if(SESSION.mode==='exam'){ answer(q,choice); return; }
  CUR.answered=true;
  CUR.opts.forEach((o,idx)=>{
    const b=document.getElementById('opt'+idx); b.onclick=null;
    if(o===q.answer){ b.classList.add('correct'); b.querySelector('.mk').textContent='✓'; }
    else if(idx===i){ b.classList.add('wrong'); b.querySelector('.mk').textContent='✕'; }
    else b.classList.add('dim');
  });
  const w=document.getElementById('why');
  w.innerHTML=`<span class="lbl">${choice===q.answer?'Correct — why':'Why the answer is "'+esc(q.answer)+'"'}</span><br>${esc(q.why||'')}${q.source?`<span class="src">source: ${esc(q.source)}</span>`:''}`;
  w.classList.add('show');
  document.getElementById('next').disabled=false;
  // record happens via answer(): call it for stats but without re-showing
  recordOnce(q, choice===q.answer);
}
let _lastRec=null;
function recordOnce(q,correct){ if(_lastRec===CUR){return;} _lastRec=CUR; SESSION.count++; if(correct)SESSION.right++; record(q,correct); }

function renderExamResult(){
  const list=SESSION.examAns; const right=list.filter(a=>a.correct).length;
  const pc=Math.round(100*right/list.length); const pass=pc>=PASS*100;
  let misses=list.filter(a=>!a.correct).map(a=>`<div class="card" style="padding:12px"><div class="qmeta"><span>Type ${a.q.type} · ${tname(a.q.topic)}</span></div>
    <div style="font-weight:600;margin-bottom:6px">${esc(a.q.q)}</div>
    <div style="color:var(--wrong);font-size:14px">Your answer: ${esc(a.choice)}</div>
    <div style="color:var(--gold);font-size:14px">Correct: ${esc(a.q.answer)}</div>
    <div class="note" style="text-align:left;margin-top:6px">${esc(a.q.why||'')}</div></div>`).join('');
  el(`<div class="card center">
      <div class="big ${pass?'pass':'fail'}">${pc}%</div>
      <b>${pass?'PASS':'Below passing'}</b>
      <div class="note">${right} / ${list.length} correct · need ${Math.round(PASS*100)}% (18/25)</div>
    </div>
    ${misses?`<h2>Review your ${list.length-right} misses</h2>${misses}`:'<div class="card center">Perfect run. Nothing missed.</div>'}
    <button class="btn gold" onclick="renderHome()"><span class="t">◂ Home</span></button>`);
}
function renderSessionDone(){
  el(`<div class="card center"><div class="big pass">${SESSION.count?Math.round(100*SESSION.right/SESSION.count):0}%</div>
    <b>Session complete</b><div class="note">${SESSION.right}/${SESSION.count} correct this session.</div></div>
    <button class="btn gold" onclick="renderHome()"><span class="t">◂ Home</span></button>`);
}
function renderEmpty(){ el(`<div class="card center">No questions in this pool.</div><button class="btn gold" onclick="renderHome()"><span class="t">◂ Home</span></button>`); }

function resetAll(){ if(confirm('Erase all saved progress on this device?')){ S=blank(); save(); renderHome(); } }
function esc(s){ return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

renderHome();
</script>
</body>
</html>
